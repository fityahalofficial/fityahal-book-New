<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fityahal — Account Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<meta name="theme-color" content="#080b12"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<style>
:root{
  --bg:#080b12;--bg2:#0d1220;--sf:#111827;--sf2:#1a2235;--sf3:#222f45;
  --tx:#f0f4ff;--tx2:#8892b0;--tx3:#4a5580;
  --ac:#5b8dee;--ac-s:rgba(91,141,238,.15);--ac-t:#93b4f8;
  --gn:#10d48e;--gn-s:rgba(16,212,142,.12);--gn-t:#34e8a8;
  --rd:#ff5c6c;--rd-s:rgba(255,92,108,.12);--rd-t:#ff8a96;
  --am:#ffad2e;--am-s:rgba(255,173,46,.12);--am-t:#ffc86a;
  --pu:#9d7afa;--pu-s:rgba(157,122,250,.12);--pu-t:#c4acff;
  --br:rgba(255,255,255,.04);--br2:rgba(255,255,255,.08);--br3:rgba(255,255,255,.13);
  --sh:0 2px 12px rgba(0,0,0,.4);--sh-m:0 8px 32px rgba(0,0,0,.5);--sh-l:0 24px 80px rgba(0,0,0,.7);
  --r:10px;--rl:14px;--rxl:20px;
  --fn:"Outfit",sans-serif;--mo:"JetBrains Mono",monospace;
  --g1:linear-gradient(135deg,#5b8dee,#9d7afa);
  --g2:linear-gradient(135deg,#10d48e,#5b8dee);
  --g3:linear-gradient(135deg,#ff5c6c,#ff8c42);
  --g4:linear-gradient(135deg,#ffad2e,#ff8c42);
}
[data-theme=light]{
  --bg:#f0f4ff;--bg2:#e4eaf8;--sf:#fff;--sf2:#f0f4ff;--sf3:#e4eaf8;
  --tx:#0d1220;--tx2:#4a5580;--tx3:#8892b0;
  --br:rgba(0,0,0,.06);--br2:rgba(0,0,0,.10);--br3:rgba(0,0,0,.16);
  --sh:0 2px 12px rgba(0,0,0,.08);--sh-m:0 8px 32px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--tx);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(91,141,238,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(91,141,238,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:3px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--sf2);border:1px solid var(--br2);border-radius:var(--r);font-size:13px;font-weight:500;font-family:var(--fn);color:var(--tx);cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:hover{background:var(--sf3);border-color:var(--br3)}
.btn-p{background:var(--g1);border-color:transparent;color:#fff;box-shadow:0 2px 12px rgba(91,141,238,.3)}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-danger{color:var(--rd-t)}.btn-danger:hover{background:var(--rd-s)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{padding:7px}

/* Inputs */
.input{width:100%;padding:10px 12px;background:var(--sf2);border:1px solid var(--br2);border-radius:var(--r);color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;transition:border-color .18s,box-shadow .18s}
.input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,141,238,.12)}
.input::placeholder{color:var(--tx3)}
textarea.input{resize:vertical;min-height:80px}

/* Cards */
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl);box-shadow:var(--sh);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh-m)}

/* Nav */
.nav-bar{background:rgba(17,24,39,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--br2);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.nav-bar::-webkit-scrollbar{display:none}
.nav-tab{padding:13px 15px;font-size:12px;font-weight:600;color:var(--tx3);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:var(--fn);transition:color .15s;display:flex;align-items:center;gap:5px}
.nav-tab:hover{color:var(--tx2)}.nav-tab.active{color:var(--ac-t);border-bottom-color:var(--ac)}

/* Top bar */
.top-bar{background:rgba(8,11,18,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--br2);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;flex-shrink:0;position:sticky;top:0;z-index:200}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;animation:fadeIn .15s}
.modal{background:var(--sf);border:1px solid var(--br2);border-radius:var(--rxl);max-width:480px;width:100%;max-height:90vh;overflow-y:auto;animation:modalPop .2s}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-bd{padding:18px 22px;display:flex;flex-direction:column;gap:13px}
.modal-ft{padding:0 22px 18px;display:flex;gap:8px;justify-content:flex-end}
.form-row{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.b-admin{background:var(--ac-s);color:var(--ac-t);border:1px solid rgba(91,141,238,.2)}
.b-viewer{background:var(--pu-s);color:var(--pu-t);border:1px solid rgba(157,122,250,.18)}
.b-ok{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(16,212,142,.2)}
.b-err{background:var(--rd-s);color:var(--rd-t);border:1px solid rgba(255,92,108,.2)}
.b-warn{background:var(--am-s);color:var(--am-t);border:1px solid rgba(255,173,46,.2)}
.b-pu{background:var(--pu-s);color:var(--pu-t);border:1px solid rgba(157,122,250,.2)}

/* Avatar */
.av{border-radius:50%;background:var(--g1);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;box-shadow:0 3px 12px rgba(91,141,238,.3);flex-shrink:0}

/* Amount */
.mono{font-family:var(--mo)}.pos{color:var(--gn-t)}.neg{color:var(--rd-t)}.bal{color:var(--ac-t)}

/* Payment chip */
.chip{width:32px;height:24px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mo);border:1px solid var(--br)}
.chip-ok{background:var(--gn-s);color:var(--gn-t);border-color:rgba(16,212,142,.2)}
.chip-no{background:var(--sf2);color:var(--tx3)}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--sf2);color:var(--tx3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:9px 11px;text-align:left;white-space:nowrap}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--br)}
.tbl tr:hover td{background:var(--sf2)}
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--br)}

/* Toast */
.toast-box{position:fixed;top:70px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:2000}
.toast{background:var(--sf);border-radius:var(--r);padding:11px 15px;min-width:220px;max-width:300px;box-shadow:var(--sh-m);border-left:3px solid var(--ac);animation:slideR .2s;font-size:13px;cursor:pointer}
.t-ok{border-color:var(--gn)}.t-err{border-color:var(--rd)}.t-warn{border-color:var(--am)}

/* Sections */
.sec{padding:18px;display:flex;flex-direction:column;gap:14px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sec-title{font-size:16px;font-weight:700}

/* Grid */
.g-stat{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.g-mem{display:grid;grid-template-columns:1fr;gap:12px}
.g-proj{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:640px){.g-mem{grid-template-columns:repeat(2,1fr)}.g-proj{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.g-stat{grid-template-columns:repeat(4,1fr)}.g-proj{grid-template-columns:repeat(3,1fr)}}

/* Progress */
.prog-bar{height:5px;background:var(--sf2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* Misc */
.divider{height:1px;background:var(--br2);margin:4px 0}
.empty{text-align:center;padding:40px 16px;color:var(--tx3)}
.empty-ico{font-size:38px;margin-bottom:10px}
.offline-bar{background:var(--am-s);border-bottom:1px solid rgba(255,173,46,.2);color:var(--am-t);padding:7px 16px;font-size:12px;text-align:center}
.undo-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--br3);border-radius:var(--rl);padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh-l);z-index:500;font-size:13px;animation:slideUp .2s}
.spin{animation:spin 1s linear infinite}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;z-index:3000;cursor:zoom-out;animation:fadeIn .15s}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain}
.pinned{background:var(--ac-s);border:1px solid rgba(91,141,238,.2);border-radius:var(--r);padding:9px 13px;font-size:13px;color:var(--ac-t);display:flex;align-items:flex-start;gap:7px}

/* Status */
.s-plan{background:var(--am-s);color:var(--am-t);border:1px solid rgba(255,173,46,.2)}
.s-act{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(16,212,142,.2)}
.s-done{background:var(--ac-s);color:var(--ac-t);border:1px solid rgba(91,141,238,.2)}
.s-hold{background:var(--pu-s);color:var(--pu-t);border:1px solid rgba(157,122,250,.2)}
.s-can{background:var(--rd-s);color:var(--rd-t);border:1px solid rgba(255,92,108,.2)}


/* ── Hamburger ── */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:4px;width:34px;height:34px;cursor:pointer;padding:5px;background:none;border:1px solid var(--br2);border-radius:var(--r);flex-shrink:0}
.hamburger span{display:block;height:2px;background:var(--tx2);border-radius:2px;transition:all .2s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;inset:0;top:48px;background:var(--bg);z-index:300;overflow-y:auto;padding:8px 0;animation:fadeIn .15s}
.mobile-menu .nav-tab{display:flex;width:100%;padding:13px 20px;border-bottom:1px solid var(--br);font-size:14px;border-left:none;border-right:none;border-top:none;border-radius:0}
.mobile-menu .nav-tab.active{background:var(--ac-s);color:var(--ac-t);border-bottom-color:var(--br)}
@media(max-width:768px){
  .hamburger{display:flex}
  .nav-tabs-row{display:none!important}
}
@media(min-width:769px){
  .hamburger{display:none!important}
  .mobile-menu{display:none!important}
  .nav-tabs-row{display:flex!important}
}

/* ── Month chip grid ── */
.month-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:2px}
.month-chip{display:flex;flex-direction:column;align-items:center;gap:1px}
.month-chip .mc-label{font-size:8px;color:var(--tx3);text-transform:uppercase;font-weight:600;letter-spacing:.2px;line-height:1}
.month-chip .mc-dot{width:100%;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.mc-dot.mc-paid{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(16,212,142,.25)}
.mc-dot.mc-unpaid{background:var(--sf2);color:var(--tx3);border:1px solid var(--br)}

/* ── Professional member card ── */
.mem-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl);overflow:hidden;transition:transform .2s,box-shadow .2s}
.mem-card:hover{transform:translateY(-2px);box-shadow:var(--sh-m)}
.mem-card-top{padding:14px 14px 10px;display:flex;align-items:flex-start;gap:11px}
.mem-card-body{padding:0 14px 12px}
.mem-card-footer{border-top:1px solid var(--br);padding:10px 14px;display:flex;gap:7px}

/* ── Role select in modal ── */
.role-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;border:2px solid var(--br2);background:var(--sf2);transition:all .15s;font-family:var(--fn)}
.role-pill.selected{border-color:var(--ac);background:var(--ac-s);color:var(--ac-t)}

/* ── Stat card professional ── */
.stat-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl);padding:16px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--sh-m)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card .sc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.stat-card .sc-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);font-weight:600;margin-bottom:5px}
.stat-card .sc-value{font-size:22px;font-weight:800;font-family:var(--mo)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

// ═══════════════════════════════════════════════════════
const SHEET_ID = '1_bEe_QbRq02bbJ_gHpw5DiGjXE_2rmznJpo98h5-cac';
const API_KEY  = 'AIzaSyCziWiqTJOKll1k4u8or9uRdoQ_H7VWWHU';
const CLIENT_ID = '885276391812-ss7igds0m4pf39mt7g0mue8o6k0cpmlc.apps.googleusercontent.com';
const SUPREME  = 'fityahalofficial@gmail.com';

const NAV = [
  {id:'dashboard',label:'Dashboard',icon:'🏠',admin:false},
  {id:'overview',label:'Overview',icon:'📊',admin:true},
  {id:'members',label:'Members',icon:'👥',admin:false},
  {id:'projects',label:'Projects',icon:'📁',admin:false},
  {id:'announcements',label:'Notices',icon:'📢',admin:false},
  {id:'nizam',label:'Nizam',icon:'📖',admin:false},
  {id:'notifications',label:'Alerts',icon:'🔔',admin:false},
  {id:'memories',label:'Memories',icon:'📸',admin:false},
  {id:'aboutus',label:'About Us',icon:'🌟',admin:false},

  {id:'profile',label:'Profile',icon:'👤',admin:false},
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S = {
  user: null, role: null,
  tab: 'dashboard',
  members:[], payments:[], costs:[], notices:[], nizam:'', aboutUs:null,
  projects:[], orgRoles:[], pendingPays:[],
  loading: false, accessToken: null,
  groupMsgs:[], dmChats:{}, dmContacts:[], activeDM:null,
  history:[], future:[], lastAction:'',
  theme: localStorage.getItem('fityahal_theme')||'dark',
  online: navigator.onLine,
  memories: (() => { try { return JSON.parse(localStorage.getItem('bft_memories')||'[]'); } catch { return []; } })(),
  activity: (() => { try { return JSON.parse(localStorage.getItem('bft_activity')||'[]'); } catch { return []; } })(),
};

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const tk = v => '৳' + Number(v||0).toFixed(2);
const curMonth = () => { const d=new Date(); return d.toLocaleString('en-US',{month:'long'})+' '+d.getFullYear(); };
const initials = n => { const p=(n||'').trim().split(' ').filter(Boolean); return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(p[0]?.[0]||'?').toUpperCase(); };
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const timeAgo = iso => { if(!iso) return ''; const d=Date.now()-new Date(iso).getTime(),s=Math.floor(d/1000),m=Math.floor(s/60),h=Math.floor(m/60),dy=Math.floor(h/24); return s<60?'just now':m<60?`${m}m ago`:h<24?`${h}h ago`:dy<30?`${dy}d ago`:new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); };
const getLast12 = () => { const months=[],now=new Date(); for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push(d.toLocaleString('en-US',{month:'long'})+' '+d.getFullYear());} return months; };
const isAdmin = () => S.role==='admin';
const statusClass = s => ({Planning:'s-plan',Active:'s-act',Completed:'s-done','On Hold':'s-hold',Cancelled:'s-can'}[s]||'');
const saveMemories = m => { S.memories=m; localStorage.setItem('bft_memories',JSON.stringify(m)); };
const saveActivity = a => { S.activity=a; localStorage.setItem('bft_activity',JSON.stringify(a)); };
const addActivity = (icon,text) => saveActivity([{icon,text,time:new Date().toISOString()},...S.activity].slice(0,100));

// ═══════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════
function applyTheme(t){
  const root=document.documentElement;
  if(t==='light') root.setAttribute('data-theme','light');
  else if(t==='dark') root.removeAttribute('data-theme');
  else { if(!window.matchMedia('(prefers-color-scheme: dark)').matches) root.setAttribute('data-theme','light'); else root.removeAttribute('data-theme'); }
}
applyTheme(S.theme);

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function toast(type,text,dur=3500){
  const id='t'+Date.now(); const box=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast t-${type}`; el.id=id;
  const ico={ok:'✅',err:'❌',warn:'⚠️',info:'ℹ️'}[type]||'';
  el.textContent=ico+' '+text;
  el.onclick=()=>el.remove();
  box.appendChild(el);
  setTimeout(()=>el.remove(),dur);
}

// ═══════════════════════════════════════════════════════
// SHEETS API
// ═══════════════════════════════════════════════════════
async function sheetRead(range){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r=await fetch(url); if(!r.ok) throw new Error('Sheet read failed');
  const d=await r.json(); return d.values||[];
}
async function sheetAppend(range,values){
  if(!S.accessToken) { toast('warn','Sign in to write data'); return; }
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS&key=${API_KEY}`;
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.accessToken},body:JSON.stringify({values})});
  if(!r.ok) throw new Error('Sheet write failed');
}
async function sheetPut(range,value){
  if(!S.accessToken) { toast('warn','Sign in to write data'); return; }
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW&key=${API_KEY}`;
  const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.accessToken},body:JSON.stringify({values:[[value]]})});
  if(!r.ok) throw new Error('Sheet update failed');
}
async function sheetClear(range){ if(!S.accessToken) return; const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:clear?key=${API_KEY}`; await fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+S.accessToken}}); }

async function loadAllData(){
  S.loading=true; render();
  try {
    const [mR,pR,cR,nR,niR,prR,orR,ppR]=await Promise.all([
      sheetRead('Members!A2:I1000'),
      sheetRead('Payments!A2:D100000'),
      sheetRead('Costs!A2:C1000'),
      sheetRead('Notices!A2:G2000'),
      sheetRead('Nizam!A2:B2'),
      sheetRead('Projects!A2:A2'),
      sheetRead('OrgRoles!A2:B200'),
      sheetRead('PendingPays!A2:G5000'),
    ]);
    S.members=mR.map(r=>({name:r[0]||'',nick:r[1]||'',phone:r[2]||'',email:r[3]||'',addr:r[4]||'',join:r[5]||'',sid:r[6]||'',notes:r[7]||'',role:r[8]||'viewer'})).filter(m=>m.name);
    S.payments=pR.map(r=>({member:r[0]||'',month:r[1]||'',monthly:parseFloat(r[2])||0,book:parseFloat(r[3])||0})).filter(p=>p.member);
    S.costs=cR.map(r=>({month:r[0]||'',amount:parseFloat(r[1])||0,desc:r[2]||''})).filter(c=>c.month);
    S.notices=nR.map(r=>({title:r[0]||'',body:r[1]||'',by:r[2]||'',time:r[3]||'',privateTo:r[4]||'',pinned:r[5]==='1',photo:r[6]||''})).filter(n=>n.title);
    S.nizam=niR[0]?.[0]||'';
    try{S.aboutUs=niR[0]?.[1]?JSON.parse(niR[0][1]):null;}catch{S.aboutUs=null;}
    try{S.projects=prR[0]?.[0]?JSON.parse(prR[0][0]):[];}catch{S.projects=[];}
    S.orgRoles=orR.map(r=>({member:r[0]||'',role:r[1]||''})).filter(r=>r.member);
    S.pendingPays=ppR.map(r=>({id:r[0]||'',memberName:r[1]||'',memberEmail:r[2]||'',key:r[3]||'',m:parseFloat(r[4])||0,b:parseFloat(r[5])||0,status:r[6]||'pending'})).filter(p=>p.id);
  } catch(e){ toast('warn','Some data failed to load: '+e.message); }
  S.loading=false; render();
}

async function fullSync(){
  try {
    await sheetClear('Members!A2:I1000');
    if(S.members.length){ const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Members!A2:I1000?valueInputOption=RAW&key=${API_KEY}`; await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.accessToken},body:JSON.stringify({values:S.members.map(m=>[m.name,m.nick,m.phone,m.email,m.addr,m.join,m.sid,m.notes,m.role])})}); }
    await sheetClear('Payments!A2:D100000');
    if(S.payments.length){ const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Payments!A2:D100000?valueInputOption=RAW&key=${API_KEY}`; await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.accessToken},body:JSON.stringify({values:S.payments.map(p=>[p.member,p.month,p.monthly,p.book])})}); }
    await sheetClear('Costs!A2:C1000');
    if(S.costs.length){ const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Costs!A2:C1000?valueInputOption=RAW&key=${API_KEY}`; await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.accessToken},body:JSON.stringify({values:S.costs.map(c=>[c.month,c.amount,c.desc])})}); }
    if(S.notices.length){ await sheetClear('Notices!A2:G2000'); const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Notices!A2:G2000?valueInputOption=RAW&key=${API_KEY}`; await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.accessToken},body:JSON.stringify({values:S.notices.map(n=>[n.title,n.body,n.by,n.time,n.privateTo||'',n.pinned?'1':'',n.photo||''])})}); }
    await sheetPut('Nizam!A2',S.nizam);
    if(S.aboutUs) await sheetPut('Nizam!B2',JSON.stringify(S.aboutUs));
    await sheetPut('Projects!A2',JSON.stringify(S.projects));
    S.lastSynced=new Date().toISOString();

  } catch(e){ toast('err','Sync failed: '+e.message); }
}

function saveState(name){
  S.history=[{snap:{members:[...S.members],payments:[...S.payments],costs:[...S.costs]},name},...S.history].slice(0,50);
  S.future=[]; S.lastAction=name;
  showUndo();
}
let undoTimer;
function showUndo(){ clearTimeout(undoTimer); render(); undoTimer=setTimeout(()=>{S.lastAction='';render();},8000); }
function doUndo(){ if(!S.history.length) return; const [{snap,name},...rest]=S.history; S.future=[{snap:{members:S.members,payments:S.payments,costs:S.costs},name},...S.future]; Object.assign(S,snap); S.history=rest; S.lastAction=''; render(); toast('info','Undone: '+name); }
function doRedo(){ if(!S.future.length) return; const [{snap,name},...rest]=S.future; S.history=[{snap:{members:S.members,payments:S.payments,costs:S.costs},name},...S.history]; Object.assign(S,snap); S.future=rest; render(); toast('info','Redone: '+name); }

function checkSession(){
  if(sessionStorage.getItem('bft_auth')==='1'){
    S.user={email:sessionStorage.getItem('bft_email')};
    S.role=sessionStorage.getItem('bft_role');
    return true;
  }
  return false;
}
function doLogin(email,role,token){
  S.user={email}; S.role=role; S.accessToken=token;
  sessionStorage.setItem('bft_auth','1');
  sessionStorage.setItem('bft_email',email);
  sessionStorage.setItem('bft_role',role);
  loadAllData();
}
function doLogout(){
  sessionStorage.clear(); S.user=null; S.role=null; S.accessToken=null;
  try{ if(window.google?.accounts?.oauth2?.revoke) window.google.accounts.oauth2.revoke(S.user?.email,()=>{}); }catch{}
  render();
}

async function googleLogin(){
  if(!window.google) { toast('err','Google API not loaded yet. Please wait a moment and try again.'); return; }
  document.getElementById('gsi-btn').disabled=true;
  document.getElementById('gsi-btn').textContent='Signing in…';
  try {
    await new Promise((res,rej)=>{
      const client=window.google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,
        scope:'https://www.googleapis.com/auth/spreadsheets email profile',
        callback: async resp => {
          if(resp.error) return rej(new Error(resp.error));
          try {
            const token=resp.access_token;
            const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+token}}).then(r=>r.json());
            const email=info.email;
            if(!email) return rej(new Error('Could not get email from Google.'));
            const acct=ACCOUNTS.find(a=>a.email===email);
            if(acct){ doLogin(email,acct.role,token); return res(); }
            const members=await sheetRead('Members!A2:I1000');
            const mem=members.find(r=>r[3]===email);
            if(mem){ doLogin(email,mem[8]==='admin'?'admin':'viewer',token); return res(); }
            rej(new Error('Access denied. Your email is not registered.'));
          } catch(e){ rej(e); }
        }
      });
      client.requestAccessToken({prompt:'consent'});
    });
  } catch(e){
    toast('err',e.message);
    const b=document.getElementById('gsi-btn');
    if(b){ b.disabled=false; b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign in with Google'; }
  }
}

function dashboardHTML(){
  const collected=S.payments.reduce((s,p)=>s+p.monthly+p.book,0);
  const totalCosts=S.costs.reduce((s,c)=>s+c.amount,0);
  const bal=collected-totalCosts;
  const monthSet=new Set([...S.payments.map(p=>p.month),...S.costs.map(c=>c.month)]);
  const months=[...monthSet].sort((a,b)=>new Date('1 '+a)-new Date('1 '+b));

  // Overdue: members who haven't paid in last 2 months
  const last2=getLast12().slice(-2);
  const overdue=S.members.filter(m=>last2.every(mo=>!S.payments.some(p=>p.member===m.name&&p.month===mo&&(p.monthly+p.book)>0)));

  const statCards=[
    {label:'Collected',value:tk(collected),color:'var(--gn-t)',grad:'var(--g2)',icon:'💰'},
    {label:'Costs',value:tk(totalCosts),color:'var(--rd-t)',grad:'var(--g3)',icon:'📉'},

    {label:'Members',value:S.members.length,color:'var(--am-t)',grad:'var(--g4)',icon:'👥'},

    const hdrs=months.map(m=>`<th>${esc(m)}</th>`).join('');

      const cells=months.map(mo=>{
        const amt=S.payments.filter(p=>p.member===mem.name&&p.month===mo).reduce((s,p)=>s+p.monthly+p.book,0);
        return `<td class="mono ${amt>0?'pos':''}">${amt>0?tk(amt):'—'}</td>`;
      }).join('');

    const balRow=months.map(mo=>{const col=S.payments.filter(p=>p.month===mo).reduce((s,p)=>s+p.monthly+p.book,0);const cost=S.costs.filter(c=>c.month===mo).reduce((s,c)=>s+c.amount,0);const b=col-cost;return `<td class="mono" style="color:${b>=0?'var(--ac-t)':'var(--rd-t)'}">${tk(b)}</td>`;}).join('');

function overviewHTML(){
  const search=(S.ovSearch||'').toLowerCase();
  const mf=S.ovMonth||'';
  const allMonths=[...new Set([...S.payments.map(p=>p.month),...S.costs.map(c=>c.month)])].sort((a,b)=>new Date('1 '+a)-new Date('1 '+b));
  const months=mf?[mf]:allMonths;
  const mems=S.members.filter(m=>m.name.toLowerCase().includes(search));
  const pending=S.pendingPays.filter(p=>p.status==='pending');

  const rows=mems.map(m=>{
    const cells=months.map(mo=>{const a=S.payments.filter(p=>p.member===m.name&&p.month===mo).reduce((s,p)=>s+p.monthly+p.book,0);return `<td class="mono ${a>0?'pos':''}">${a>0?tk(a):'—'}</td>`;}).join('');
    const tot=months.reduce((s,mo)=>s+S.payments.filter(p=>p.member===m.name&&p.month===mo).reduce((ss,p)=>ss+p.monthly+p.book,0),0);
    return `<tr><td style="font-weight:600">${esc(m.name)}</td>${cells}<td class="mono pos">${tk(tot)}</td></tr>`;
  }).join('');

  return `<div class="sec">
    <h2 class="sec-title">Financial Overview</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input class="input" style="max-width:200px" placeholder="🔍 Filter members…" value="${esc(S.ovSearch||'')}" oninput="S.ovSearch=this.value;render()"/>
      <select class="input" style="max-width:180px" onchange="S.ovMonth=this.value;render()">
        <option value="">All months</option>
        ${allMonths.map(m=>`<option ${mf===m?'selected':''}>${esc(m)}</option>`).join('')}
      </select>
    </div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th style="min-width:130px">Member</th>${months.map(m=>`<th>${esc(m)}</th>`).join('')}<th>Total</th></tr></thead><tbody>${rows||'<tr><td colspan="99" style="text-align:center;color:var(--tx3)">No data</td></tr>'}</tbody></table></div>
    <div>
      <h3 style="font-size:14px;font-weight:700;margin-bottom:9px">Costs</h3>
      ${S.costs.length?`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Month</th><th>Amount</th><th>Description</th></tr></thead><tbody>${S.costs.filter(c=>!mf||c.month===mf).map(c=>`<tr><td style="color:var(--tx2)">${esc(c.month)}</td><td class="mono neg">${tk(c.amount)}</td><td>${esc(c.desc)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty"><div class="empty-ico">💸</div><p>No costs recorded</p></div>`}
    </div>
    <div>
      <h3 style="font-size:14px;font-weight:700;margin-bottom:9px">Pending Payments ${pending.length?`<span class="badge b-warn">${pending.length}</span>`:''}</h3>
      ${pending.length?pending.map((p,i)=>`<div style="background:var(--sf);border:1px solid var(--br2);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px">
        <div><div style="font-weight:700;margin-bottom:3px">${esc(p.memberName)}</div><div style="font-size:12px;color:var(--tx2)">Monthly: <span class="mono pos">${tk(p.m)}</span> · Book: <span class="mono pos">${tk(p.b)}</span></div><div style="font-size:11px;color:var(--tx3);margin-top:2px">TxID: <span class="mono">${esc(p.key)}</span></div></div>
        <div style="display:flex;gap:7px"><button class="btn btn-sm" style="color:var(--gn-t)" onclick="approvePay('${p.id}')">✅ Approve</button><button class="btn btn-sm btn-danger" onclick="rejectPay('${p.id}')">❌ Reject</button></div>
      </div>`).join(''):`<div class="empty"><div class="empty-ico">✅</div><p>No pending payments</p></div>`}
    </div>
  </div>`;
}

const modals = {};

function openModal(name, data={}){
  _activeModal = name;
  _modalData = data;
  renderModal();
}
function closeModal(){ _activeModal=null; _modalData={}; document.getElementById('modal-root').innerHTML=''; }
let _modalData = {};

function renderModal(){
  const root=document.getElementById('modal-root');

  const html = getModalHTML(_activeModal, _modalData);
  root.innerHTML=`<div class="modal-bg" id="modal-bg" onclick="if(event.target.id==='modal-bg')closeModal()">${html}</div>`;
}

function g(id){ return document.getElementById(id); }
function gv(id){ const el=g(id); return el?el.value:''; }

async function savePayment(){
  const mem=gv('pm-mem'),mo=gv('pm-mo'),m=parseFloat(gv('pm-m'))||0,b=parseFloat(gv('pm-b'))||0;
  if(!mem||!mo){ toast('warn','Member and month required'); return; }
  saveState('Add Payment');
  const pay={member:mem,month:mo,monthly:m,book:b};
  S.payments.push(pay);
  closeModal(); render(); toast('ok','Payment recorded!');
  try{ await sheetAppend('Payments!A:D',[[mem,mo,m,b]]); }catch(e){ toast('err','Sync failed: '+e.message); }
  addActivity('💰',`Payment recorded for ${mem}`);
}

async function saveCost(){
  const mo=gv('pc-mo'),am=parseFloat(gv('pc-am')),desc=gv('pc-desc');
  if(!mo||!am||!desc){ toast('warn','All fields required'); return; }
  saveState('Add Cost');
  const cost={month:mo,amount:am,desc};
  S.costs.push(cost);
  closeModal(); render(); toast('ok','Cost recorded!');
  try{ await sheetAppend('Costs!A:C',[[mo,am,desc]]); }catch(e){ toast('err','Sync failed: '+e.message); }
}

async function saveMember(idx){
  const name=gv('mb-name');
  if(!name){ toast('warn','Name is required'); return; }
  const mem={name,nick:gv('mb-nick'),phone:gv('mb-phone'),email:gv('mb-email'),addr:gv('mb-addr'),join:gv('mb-join'),sid:gv('mb-sid'),notes:gv('mb-notes'),role:gv('mb-role')||'viewer'};
  saveState(idx>=0?'Edit Member':'Add Member');
  if(idx>=0) S.members[idx]=mem;
  else { S.members.push(mem); try{ await sheetAppend('Members!A:I',[[mem.name,mem.nick,mem.phone,mem.email,mem.addr,mem.join,mem.sid,mem.notes,mem.role]]); }catch(e){ toast('err','Sync failed'); } }
  closeModal(); render(); toast('ok',idx>=0?'Member updated!':'Member added!');
}

function openMemberEdit(i){ openModal('editMember',{...S.members[i]}); }
function openMemberPay(i){ openModal('memberPay',{name:S.members[i].name}); }

async function saveMemberPay(name){
  const mo=gv('mp-mo'),m=parseFloat(gv('mp-m'))||0,b=parseFloat(gv('mp-b'))||0;
  saveState('Log Member Payment');
  const pay={member:name,month:mo,monthly:m,book:b};
  S.payments.push(pay);
  closeModal(); render(); toast('ok','Payment logged!');
  try{ await sheetAppend('Payments!A:D',[[name,mo,m,b]]); }catch(e){ toast('err','Sync failed'); }
}

function deleteMember(i){
  if(!confirm(`Delete ${S.members[i].name}?`)) return;
  saveState('Delete Member');
  S.members.splice(i,1); render(); toast('ok','Member deleted (sync to save).');
}

async function saveProject(){
  const title=gv('pj-title');
  if(!title){ toast('warn','Title required'); return; }
  saveState('Add Project');
  const proj={id:genId(),title,description:gv('pj-desc'),status:gv('pj-status'),budget:parseFloat(gv('pj-budget'))||0,spent:0,members:[],startDate:gv('pj-start'),endDate:gv('pj-end'),expenses:[],collections:[],createdAt:new Date().toISOString()};
  S.projects.push(proj);
  closeModal(); render(); toast('ok','Project created!');
  try{ await sheetPut('Projects!A2',JSON.stringify(S.projects)); }catch(e){ toast('err','Sync failed'); }
}

  if(!confirm(`Delete "${S.projects[i].title}"?`)) return;

  S.projects.splice(i,1); render(); toast('ok','Project deleted.');
  sheetPut('Projects!A2',JSON.stringify(S.projects)).catch(e=>toast('err','Sync failed'));
}

function openProjectDetail(i){ openModal('projectDetail',S.projects[i]); }
function openNoticeDetail(i){
  const visible=S.notices.filter(n=>{if(!n.privateTo)return true;return n.privateTo.split(',').map(e=>e.trim()).includes(S.user?.email);});
  const sorted=[...visible].sort((a,b)=>{if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;return new Date(b.time)-new Date(a.time);});
  openModal('noticeDetail',sorted[i]);
}

async function saveNotice(){
  const title=gv('no-title'),body=gv('no-body'),by=gv('no-by');
  if(!title||!body){ toast('warn','Title and body required'); return; }
  const photo = await fileToBase64('no-photo');
  const notice={title,body,by,time:new Date().toISOString(),privateTo:gv('no-priv'),pinned:g('no-pin')?.checked||false,photo:photo||''};
  S.notices.unshift(notice);
  closeModal(); render(); toast('ok','Announcement posted!');
  try{ await sheetAppend('Notices!A:G',[[title,body,by,notice.time,notice.privateTo,notice.pinned?'1':'',notice.photo]]); }catch(e){ toast('err','Sync failed'); }
  addActivity('📢',`New announcement: ${title}`);
}

}

async function saveMemory(){
  const file=g('mem-file')?.files[0];
  let fileData='',fileType='';
  if(file){ const r=await new Promise(res=>{const fr=new FileReader();fr.onload=e=>res(e.target.result);fr.readAsDataURL(file);}); fileData=r; fileType=file.type; }
  const mem={id:genId(),caption:gv('mem-cap'),videoUrl:gv('mem-url'),fileData,fileType,tags:[..._memTags],date:gv('mem-date'),likes:[],comments:[],postedBy:S.user?.email||'',time:new Date().toISOString()};
  _memTags=[];
  saveMemories([mem,...S.memories]);
  closeModal(); render(); toast('ok','Memory posted!');
  addActivity('📸','New memory posted');
}

function toggleLike(i){
  const m=S.memories[i]; const email=S.user?.email;
  m.likes=m.likes.includes(email)?m.likes.filter(e=>e!==email):[...m.likes,email];
  saveMemories([...S.memories]); render();
}

function addComment(i){
  const inp=g(`cmt-${i}`); if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  const c={name:S.user?.email?.split('@')[0]||'User',email:S.user?.email,text,time:new Date().toISOString()};
  S.memories[i].comments.push(c);
  saveMemories([...S.memories]); render();
}

function deleteMemory(i){
  if(!confirm('Delete this memory?')) return;
  S.memories.splice(i,1); saveMemories([...S.memories]); render(); toast('ok','Deleted.');
}

async function saveAboutUs(){
  const au={adminName:gv('au-name'),adminBio:gv('au-bio'),motto:gv('au-motto'),fbPage:gv('au-fb'),fbGroup:gv('au-grp')};
  S.aboutUs=au; closeModal(); render(); toast('ok','About Us updated!');
  try{ await sheetPut('Nizam!B2',JSON.stringify(au)); }catch(e){ toast('err','Sync failed'); }
}

async function approvePay(id){
  const p=S.pendingPays.find(p=>p.id===id); if(!p) return;
  saveState('Approve Payment');
  p.status='approved';
  const pay={member:p.memberName,month:curMonth(),monthly:p.m,book:p.b};
  S.payments.push(pay); render(); toast('ok','Payment approved!');
  addActivity('✅',`Payment approved for ${p.memberName}`);
  try{ await sheetAppend('Payments!A:D',[[pay.member,pay.month,pay.monthly,pay.book]]); }catch(e){}
}

function rejectPay(id){
  const p=S.pendingPays.find(p=>p.id===id); if(!p) return;
  if(!confirm('Reject this payment?')) return;
  p.status='rejected'; render(); toast('info','Payment rejected.');
}

async function submitPayment(){
  const mo=gv('sp-mo'),key=gv('sp-key');
  if(!mo||!key){ toast('warn','Month and TxID required'); return; }
  const mem=S.members.find(m=>m.email===S.user?.email);
  const pay={id:genId(),memberName:mem?.name||S.user?.email,memberEmail:S.user?.email,key,m:parseFloat(gv('sp-m'))||0,b:parseFloat(gv('sp-b'))||0,status:'pending'};
  S.pendingPays.push(pay);
  closeModal(); render(); toast('ok','Payment submitted! Awaiting admin approval.');
  try{ await sheetAppend('PendingPays!A:G',[[pay.id,pay.memberName,pay.memberEmail,pay.key,pay.m,pay.b,'pending']]); }catch(e){ toast('err','Sync failed'); }
}

function setTheme(t){ S.theme=t; localStorage.setItem('fityahal_theme',t); applyTheme(t); render(); }

async function doSync(){
  S.syncStatus='syncing'; render();
  try{ await fullSync(); S.syncStatus='ok'; }catch(e){ S.syncStatus='error'; }
  render();
}

function openLightbox(src){
  const lb=document.createElement('div');
  lb.className='lightbox'; lb.onclick=()=>lb.remove();
  lb.innerHTML=`<img src="${esc(src)}" alt="memory"/>`;
  document.body.appendChild(lb);
}

async function fileToBase64(inputId){
  const inp=g(inputId); if(!inp||!inp.files[0]) return '';
  return new Promise(res=>{ const fr=new FileReader(); fr.onload=e=>res(e.target.result); fr.readAsDataURL(inp.files[0]); });
}

            ${isAdmin()&&!del?`<button onclick="pinGroupMsg(${i})" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:10px;padding:0">${m.pinned?'📌':'📍'}</button>`:''}

    const active=S.activeDM;
    const dmMsgs=active&&S.dmChats[active]?S.dmChats[active]:[];
    const dmRows=dmMsgs.map(m=>{
      const mine=m.email===S.user?.email;
      return `<div style="display:flex;gap:8px;flex-direction:${mine?'row-reverse':'row'};margin-bottom:9px">
        <div style="background:${mine?'var(--ac)':'var(--sf2)'};color:${mine?'#fff':'var(--tx)'};border-radius:11px;padding:8px 12px;font-size:13px;max-width:72%">${esc(m.text)}</div>

    const contactList=allContacts.map(c=>{
      const mem=S.members.find(m=>m.email===c);
      const displayName=mem?mem.name:c.split('@')[0];
      const unread=(S.dmChats[c]||[]).filter(m=>m.email!==S.user?.email&&!m.read).length;
      return `<div onclick="S.activeDM='${esc(c)}';S.msgTab='dm';render();setTimeout(()=>{const b=document.getElementById('dm-bottom');if(b)b.scrollIntoView();},80)"

        ${allContacts.length?contactList:`<div style="padding:16px;font-size:13px;color:var(--tx3);text-align:center">No members with emails found</div>`}

      <button class="nav-tab ${gTab==='dm'?'active':''}" onclick="S.msgTab='dm';render()">📩 Direct Messages</button>

function sendGroupMsg(){
  const inp=document.getElementById('gchat-input');
  if(!inp||!inp.value.trim()) return;
  const msg={email:S.user?.email,name:S.members.find(m=>m.email===S.user?.email)?.name||S.user?.email?.split('@')[0]||'User',text:inp.value.trim(),time:new Date().toISOString(),deleted:false,pinned:false};
  if(!S.groupMsgs) S.groupMsgs=[];
  S.groupMsgs.push(msg);
  saveGroupMsgs();
  inp.value='';
  // Re-render just chat area to preserve scroll
  const chatMsgsEl=document.getElementById('gchat-msgs');
  if(chatMsgsEl){
    // append new message directly
    const msgs=S.groupMsgs;
    const i=msgs.length-1;
    const m=msgs[i];
    const mine=m.email===S.user?.email;
    const div=document.createElement('div');
    div.style.cssText=`display:flex;gap:8px;flex-direction:${mine?'row-reverse':'row'};align-items:flex-end;margin-bottom:10px`;
    div.innerHTML=`${avHTML(m.name||'?',28)}<div style="max-width:72%"><div style="background:${mine?'var(--ac)':'var(--sf2)'};color:${mine?'#fff':'var(--tx)'};border-radius:11px;padding:8px 12px;font-size:13px">${esc(m.text)}</div><div style="font-size:10px;color:var(--tx3);margin-top:2px;text-align:${mine?'right':'left'}">${new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
    const bottom=document.getElementById('gchat-bottom');
    if(bottom){ chatMsgsEl.insertBefore(div,bottom); bottom.scrollIntoView({behavior:'smooth'}); }
  } else { renderScreen(); setTimeout(()=>{const b=document.getElementById('gchat-bottom');if(b)b.scrollIntoView();},80); }
}

function deleteGroupMsg(i){ if(!S.groupMsgs[i]) return; S.groupMsgs[i].deleted=true; saveGroupMsgs(); renderScreen(); }
function pinGroupMsg(i){ if(!S.groupMsgs[i]) return; S.groupMsgs[i].pinned=!S.groupMsgs[i].pinned; saveGroupMsgs(); renderScreen(); }
function saveGroupMsgs(){ try{localStorage.setItem('bft_gchat',JSON.stringify((S.groupMsgs||[]).slice(-300)));}catch{} }

function sendDM(){
  const inp=document.getElementById('dm-input');
  if(!inp||!inp.value.trim()||!S.activeDM) return;
  if(!S.dmChats[S.activeDM]) S.dmChats[S.activeDM]=[];
  S.dmChats[S.activeDM].push({email:S.user?.email,text:inp.value.trim(),time:new Date().toISOString(),read:false});
  inp.value=''; saveDMs();
  const bottom=document.getElementById('dm-bottom');
  if(bottom){
    const container=bottom.parentElement;
    const mine=true;
    const div=document.createElement('div');
    div.style.cssText=`display:flex;gap:8px;flex-direction:row-reverse;margin-bottom:9px`;
    div.innerHTML=`<div style="background:var(--ac);color:#fff;border-radius:11px;padding:8px 12px;font-size:13px;max-width:72%">${esc(S.dmChats[S.activeDM].slice(-1)[0].text)}</div>`;
    container.insertBefore(div,bottom);
    bottom.scrollIntoView({behavior:'smooth'});
  } else { renderScreen(); setTimeout(()=>{const b=document.getElementById('dm-bottom');if(b)b.scrollIntoView();},80); }
}

function saveDMs(){ try{localStorage.setItem('bft_dms',JSON.stringify({chats:S.dmChats,contacts:S.dmContacts}));}catch{} }

function orgRolesHTML(){
  const ROLES=['Alif','Nayeb','Khazin','General Member'];
  return `<div class="sec">
    <div class="sec-hd"><h2 class="sec-title">🎖️ Org Roles</h2><button class="btn btn-p btn-sm" onclick="saveOrgRoles()">💾 Save to Sheet</button></div>
    <p style="font-size:13px;color:var(--tx2)">Assign organisation roles to members. These appear on member cards and About Us page.</p>
    ${ROLES.map(role=>{
      const assigned=S.orgRoles.filter(r=>r.role===role);
      const unassigned=S.members.filter(m=>!S.orgRoles.find(r=>r.member===m.name&&r.role===role));
      return `<div class="card" style="padding:14px">
        <div style="font-weight:700;font-size:14px;margin-bottom:10px">${esc(role)}</div>
        ${assigned.length?assigned.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--sf2);border-radius:8px;padding:8px 11px;margin-bottom:6px">
          <div style="display:flex;gap:9px;align-items:center">${avHTML(r.member,30)}<span style="font-size:13px;font-weight:600">${esc(r.member)}</span></div>
          <button class="btn btn-sm btn-danger" onclick="removeOrgRole('${esc(r.member)}','${esc(role)}')">✕</button>
        </div>`).join(''):''}
        <select class="input" style="font-size:12px" onchange="addOrgRole(this.value,'${esc(role)}');this.value=''">
          <option value="">+ Assign member…</option>
          ${S.members.map(m=>`<option value="${esc(m.name)}">${esc(m.name)}</option>`).join('')}
        </select>
      </div>`;
    }).join('')}
  </div>`;
}

function addOrgRole(member,role){
  if(!member) return;
  if(!S.orgRoles.find(r=>r.member===member&&r.role===role)) S.orgRoles.push({member,role});
  renderScreen();
}
function removeOrgRole(member,role){
  S.orgRoles=S.orgRoles.filter(r=>!(r.member===member&&r.role===role));
  renderScreen();
}
async function saveOrgRoles(){
  try{
    await sheetClear('OrgRoles!A2:B200');
    if(S.orgRoles.length){
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/OrgRoles!A2:B200?valueInputOption=RAW&key=${API_KEY}`;
      await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.accessToken},body:JSON.stringify({values:S.orgRoles.map(r=>[r.member,r.role])})});
    }
    toast('ok','Org Roles saved!');
  }catch(e){toast('err','Sync failed: '+e.message);}
}

function exportPDF(){
  // Build a printable HTML report
  const collected=S.payments.reduce((s,p)=>s+p.monthly+p.book,0);
  const totalCosts=S.costs.reduce((s,c)=>s+c.amount,0);
  const bal=collected-totalCosts;
  const now=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const monthSet=new Set([...S.payments.map(p=>p.month),...S.costs.map(c=>c.month)]);
  const months=[...monthSet].sort((a,b)=>new Date('1 '+a)-new Date('1 '+b));

  const memberRows=S.members.map(m=>{
    const cells=months.map(mo=>{const a=S.payments.filter(p=>p.member===m.name&&p.month===mo).reduce((s,p)=>s+p.monthly+p.book,0);return `<td style="text-align:right;font-family:monospace">${a>0?tk(a):'—'}</td>`;}).join('');
    const tot=months.reduce((s,mo)=>s+S.payments.filter(p=>p.member===m.name&&p.month===mo).reduce((ss,p)=>ss+p.monthly+p.book,0),0);
    return `<tr><td>${m.name}</td>${cells}<td style="text-align:right;font-family:monospace;font-weight:bold">${tk(tot)}</td></tr>`;
  }).join('');

  const costRows=S.costs.map(c=>`<tr><td>${c.month}</td><td style="text-align:right;font-family:monospace">${tk(c.amount)}</td><td>${c.desc}</td></tr>`).join('');

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Fityahal Report — ${now}</title><style>
    body{font-family:Georgia,serif;margin:32px;color:#111;font-size:13px}
    h1{font-size:22px;margin-bottom:4px}
    h2{font-size:16px;margin:24px 0 10px;border-bottom:1px solid #ccc;padding-bottom:4px}
    table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px}
    th{background:#f0f0f0;padding:6px 8px;text-align:left;border:1px solid #ddd;font-size:11px}
    td{padding:6px 8px;border:1px solid #ddd}
    .stat{display:inline-block;margin-right:24px;margin-bottom:12px}
    .stat-label{font-size:11px;color:#666;text-transform:uppercase}
    .stat-value{font-size:18px;font-weight:bold;font-family:monospace}
    @media print{body{margin:0}}
  </style></head><body>
    <h1>Fityahal — Account Report</h1>
    <p style="color:#666;margin-bottom:20px">Generated: ${now}</p>
    <div>
      <div class="stat"><div class="stat-label">Collected</div><div class="stat-value">${tk(collected)}</div></div>
      <div class="stat"><div class="stat-label">Costs</div><div class="stat-value">${tk(totalCosts)}</div></div>
      <div class="stat"><div class="stat-label">Balance</div><div class="stat-value">${tk(bal)}</div></div>
      <div class="stat"><div class="stat-label">Members</div><div class="stat-value">${S.members.length}</div></div>
    </div>
    <h2>Payment Overview</h2>
    <table><thead><tr><th>Member</th>${months.map(m=>`<th style="text-align:right">${m}</th>`).join('')}<th style="text-align:right">Total</th></tr></thead><tbody>${memberRows}</tbody></table>
    <h2>Costs</h2>
    <table><thead><tr><th>Month</th><th style="text-align:right">Amount</th><th>Description</th></tr></thead><tbody>${costRows||'<tr><td colspan="3" style="text-align:center;color:#999">No costs recorded</td></tr>'}</tbody></table>
    <h2>Members (${S.members.length})</h2>
    <table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Join Date</th><th>ID</th><th>Role</th></tr></thead><tbody>${S.members.map(m=>`<tr><td>${m.name}</td><td>${m.phone||'—'}</td><td>${m.email||'—'}</td><td>${m.join||'—'}</td><td>${m.sid||'—'}</td><td>${m.role}</td></tr>`).join('')}</tbody></table>
    <p style="color:#999;font-size:11px;margin-top:24px">Fityahal Account Book · "We Here And Obey"</p>
    <script>window.onload=()=>window.print();<\/script>
  </body></html>`);
  win.document.close();
}

  const app=document.getElementById('app');

  const nav=NAV.filter(n=>!n.admin||isAdmin());
  const navHTML=nav.map(n=>`<button class="nav-tab ${S.tab===n.id?'active':''}" onclick="S.tab='${n.id}';S.mobileMenuOpen=false;render()">${n.icon} ${n.label}</button>`).join('');
  const mobileMenuHTML=`<div class="mobile-menu" id="mobile-menu" style="display:${S.mobileMenuOpen?'block':'none'}">${nav.map(n=>`<button class="nav-tab ${S.tab===n.id?'active':''}" onclick="S.tab='${n.id}';S.mobileMenuOpen=false;render()">${n.icon} ${n.label}</button>`).join('')}</div>`;

  const screenFns={dashboard:dashboardHTML,overview:overviewHTML,members:membersHTML,projects:projectsHTML,announcements:announcementsHTML,nizam:nizamHTML,notifications:notificationsHTML,memories:memoriesHTML,aboutus:aboutUsHTML,sync:syncHTML,profile:profileHTML,messages:messagesHTML,orgroles:orgRolesHTML};
  const content=S.loading?`<div style="display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:12px"><div class="spin" style="width:38px;height:38px;border:3px solid var(--br2);border-top-color:var(--ac);border-radius:50%"></div><p style="color:var(--tx3);font-size:13px">Loading from Google Sheets…</p></div>`:(screenFns[S.tab]||dashboardHTML)();

  app.innerHTML=`
    ${!S.online?`<div class="offline-bar">⚠️ You are offline — changes will sync when reconnected</div>`:''}
    <div style="background:rgba(8,11,18,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--br2);position:sticky;top:0;z-index:200;flex-shrink:0">
      <div style="display:flex;align-items:center;height:48px;padding:0 12px;gap:8px">
        <span style="font-size:18px;flex-shrink:0">📖</span>
        <span style="font-weight:800;font-size:15px;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0">Fityahal</span>
        ${S.loading?`<div class="spin" style="width:11px;height:11px;border:2px solid var(--br2);border-top-color:var(--ac);border-radius:50%;flex-shrink:0"></div>`:''}
        <div style="flex:1;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch" class="nav-tabs-row">
          <div style="display:flex;height:48px">${navHTML}</div>
        </div>
        <div style="display:flex;align-items:center;gap:7px;flex-shrink:0;margin-left:auto">
          <button class="hamburger ${S.mobileMenuOpen?'open':''}" onclick="S.mobileMenuOpen=!S.mobileMenuOpen;render()" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <button onclick="S.tab='profile';S.mobileMenuOpen=false;render()" style="width:30px;height:30px;border-radius:50%;background:var(--g1);border:none;color:#fff;font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0">${(S.user?.email?.[0]||'U').toUpperCase()}</button>
        </div>
      </div>
    </div>
    ${mobileMenuHTML}
    <main style="flex:1;overflow-y:auto">${content}</main>
    ${S.lastAction&&S.history.length?`<div class="undo-bar"><span style="color:var(--tx2);font-size:13px">↩ ${esc(S.lastAction)}</span><button class="btn btn-sm" onclick="doUndo()">Undo</button>${S.future.length?`<button class="btn btn-sm" onclick="doRedo()">Redo</button>`:''}<button class="btn btn-icon btn-sm" onclick="S.lastAction='';render()">✕</button></div>`:''}
  `;
  renderModal();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
// Add modal root
const modalRoot=document.createElement('div');
modalRoot.id='modal-root';
document.body.appendChild(modalRoot);

window.addEventListener('online',()=>{S.online=true;render();});
window.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if(isAdmin())doSync();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();doRedo();}
});
window.addEventListener('offline',()=>{S.online=false;render();});

// Load Google Identity Services
const gScript=document.createElement('script');
gScript.src='https://accounts.google.com/gsi/client';
gScript.async=true;
document.head.appendChild(gScript);

// Load saved chat + DM data
try{S.groupMsgs=JSON.parse(localStorage.getItem('bft_gchat')||'[]');}catch{S.groupMsgs=[];}
try{const d=JSON.parse(localStorage.getItem('bft_dms')||'{}');S.dmChats=d.chats||{};S.dmContacts=d.contacts||[];}catch{S.dmChats={};S.dmContacts=[];}

if(checkSession()){
  render();
  loadAllData();
} else {
  render();
}
</script>
</body>
</html>
