<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#080b12"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Fityahal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── Design Tokens ── */
:root{
  --bg:#080b12;--sf:#0f1520;--sf2:#141d2e;--sf3:#1a2540;--sf4:#212e4a;
  --tx:#f0f4ff;--tx2:#8892b0;--tx3:#3d4d6a;
  --ac:#5b8dee;--ac-d:#3d6fd4;--ac-s:rgba(91,141,238,.12);--ac-t:#93b4f8;
  --gn:#10d48e;--gn-s:rgba(16,212,142,.10);--gn-t:#2fd89a;
  --rd:#ff4d5e;--rd-s:rgba(255,77,94,.10);--rd-t:#ff7a88;
  --am:#f5a623;--am-s:rgba(245,166,35,.10);--am-t:#ffc04a;
  --pu:#9d7afa;--pu-s:rgba(157,122,250,.10);--pu-t:#b89cff;
  --br:rgba(255,255,255,.05);--br2:rgba(255,255,255,.09);--br3:rgba(255,255,255,.14);
  --sh:0 2px 8px rgba(0,0,0,.4);--sh-m:0 8px 24px rgba(0,0,0,.5);--sh-l:0 20px 60px rgba(0,0,0,.7);
  --r:10px;--rl:14px;--rxl:20px;
  --fn:"Inter",sans-serif;--mo:"JetBrains Mono",monospace;
  --g1:linear-gradient(135deg,#5b8dee,#9d7afa);
  --g2:linear-gradient(135deg,#10d48e,#5b8dee);
  --g3:linear-gradient(135deg,#ff4d5e,#f5823a);
  --g4:linear-gradient(135deg,#f5a623,#ff4d5e);
}
[data-theme=light]{
  --bg:#f0f4ff;--sf:#fff;--sf2:#f0f4ff;--sf3:#e4eaf8;--sf4:#d8dff5;
  --tx:#0d1220;--tx2:#4a5580;--tx3:#8892b0;
  --br:rgba(0,0,0,.06);--br2:rgba(0,0,0,.1);--br3:rgba(0,0,0,.15);
  --sh:0 2px 8px rgba(0,0,0,.07);--sh-m:0 8px 24px rgba(0,0,0,.1);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(91,141,238,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(91,141,238,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
body::after{content:"";position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(91,141,238,.07),transparent 70%);pointer-events:none;z-index:0}
#app{min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--sf4);border-radius:4px}

/* ── Typography ── */
.label{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px}
.title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.mono{font-family:var(--mo)}
.pos{color:var(--gn-t)}.neg{color:var(--rd-t)}.bal{color:var(--ac-t)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;background:var(--sf2);border:1px solid var(--br2);border-radius:var(--r);font-size:13.5px;font-weight:500;font-family:var(--fn);color:var(--tx);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--sf3);border-color:var(--br3);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--ac);border-color:transparent;color:#fff;font-weight:600;box-shadow:0 2px 12px rgba(91,141,238,.3)}
.btn-p:hover{background:var(--ac-d);box-shadow:0 4px 20px rgba(91,141,238,.4)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--tx2)}
.btn-ghost:hover{background:var(--sf2);color:var(--tx);transform:none}
.btn-danger{background:var(--rd-s);border-color:rgba(255,77,94,.2);color:var(--rd-t)}
.btn-danger:hover{background:rgba(255,77,94,.18);transform:translateY(-1px)}
.btn-success{background:var(--gn-s);border-color:rgba(16,212,142,.2);color:var(--gn-t)}
.btn-sm{padding:6px 12px;font-size:12.5px}
.btn-xs{padding:4px 9px;font-size:11.5px;border-radius:8px}
.btn-icon{padding:8px;border-radius:var(--r)}
.btn-icon.btn-sm{padding:6px}

/* ── Inputs ── */
.inp{width:100%;padding:10px 14px;background:var(--sf2);border:1px solid var(--br2);border-radius:var(--r);color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.5}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,141,238,.12)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:vertical;min-height:90px}
select.inp option{background:var(--sf2)}
.inp-wrap{position:relative;display:flex;align-items:center}
.inp-wrap .inp{padding-left:36px}
.inp-wrap .inp-ico{position:absolute;left:11px;color:var(--tx3);font-size:15px;pointer-events:none}

/* ── Cards ── */
.card{background:var(--sf);border:1px solid var(--br2);border-radius:var(--rl);box-shadow:var(--sh)}
.card-hover{transition:transform .2s,box-shadow .2s,border-color .2s}
.card-hover:hover{transform:translateY(-3px);box-shadow:var(--sh-m);border-color:var(--br3)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.b-admin{background:var(--ac-s);color:var(--ac-t);border:1px solid rgba(91,141,238,.2)}
.b-ok{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(16,212,142,.2)}
.b-err{background:var(--rd-s);color:var(--rd-t);border:1px solid rgba(255,77,94,.2)}
.b-warn{background:var(--am-s);color:var(--am-t);border:1px solid rgba(245,166,35,.2)}
.b-pu{background:var(--pu-s);color:var(--pu-t);border:1px solid rgba(157,122,250,.2)}
.b-gen{background:var(--sf3);color:var(--tx2);border:1px solid var(--br2)}
.b-sup{background:var(--g4);color:#fff;border:none;box-shadow:0 2px 8px rgba(245,166,35,.3)}

/* ── Avatar ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden;background:var(--g1);color:#fff}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── Toast ── */
.toast-box{position:fixed;top:64px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none}
.toast{background:var(--sf);border-radius:var(--rl);padding:13px 16px;min-width:240px;max-width:340px;box-shadow:var(--sh-l);border:1px solid var(--br2);border-left:4px solid var(--ac);animation:slideR .2s ease;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:10px;pointer-events:all}
.toast.t-ok{border-left-color:var(--gn)}.toast.t-err{border-left-color:var(--rd)}.toast.t-warn{border-left-color:var(--am)}.toast.t-info{border-left-color:var(--pu)}

/* ── Topbar ── */
.topbar{background:rgba(8,11,18,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--br2);position:sticky;top:0;z-index:500;flex-shrink:0}
.topbar-inner{display:flex;align-items:center;height:54px;padding:0 16px}
.logo-area{display:flex;align-items:center;gap:10px;flex-shrink:0;padding-right:16px;border-right:1px solid var(--br2);margin-right:8px}
.logo-img{height:32px;width:auto}
.nav-scroll{flex:1;display:flex;align-items:stretch;height:54px;overflow-x:auto;scrollbar-width:none}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-tab{display:flex;align-items:center;gap:6px;padding:0 15px;height:54px;font-size:13px;font-weight:500;color:var(--tx3);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:var(--fn);transition:color .15s,border-color .15s;flex-shrink:0;position:relative}
.nav-tab:hover{color:var(--tx2)}
.nav-tab.active{color:var(--ac-t);border-bottom-color:var(--ac);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:9px;flex-shrink:0;padding-left:12px;border-left:1px solid var(--br2);margin-left:auto}
/* Hamburger */
.hbg{display:none;flex-direction:column;gap:5px;width:34px;height:34px;cursor:pointer;padding:7px;background:none;border:1px solid var(--br2);border-radius:var(--r);flex-shrink:0}
.hbg span{display:block;height:2px;background:var(--tx2);border-radius:2px;transition:all .22s}
.hbg.open span:first-child{transform:translateY(7px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hbg.open span:last-child{transform:translateY(-7px) rotate(-45deg)}
.mob-menu{display:none;position:fixed;inset:0;top:54px;background:var(--bg);z-index:400;overflow-y:auto;border-top:1px solid var(--br2)}
.mob-menu.open{display:block;animation:fadeIn .15s}
.mob-tab{display:flex;align-items:center;gap:14px;width:100%;padding:16px 22px;font-size:15px;font-weight:500;color:var(--tx2);border:none;background:none;cursor:pointer;font-family:var(--fn);border-bottom:1px solid var(--br);transition:background .12s;text-align:left}
.mob-tab:hover{background:var(--sf2);color:var(--tx)}
.mob-tab.active{background:var(--ac-s);color:var(--ac-t);font-weight:600;border-left:3px solid var(--ac)}
@media(max-width:700px){.hbg{display:flex}.nav-scroll{display:none}.role-lbl{display:none}}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{background:rgba(255,255,255,.03);color:var(--tx2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:11px 14px;text-align:left;border-bottom:1px solid var(--br2)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--br);vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--br2)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;animation:fadeIn .15s}
.modal{background:var(--sf);border:1px solid var(--br2);border-radius:var(--rxl);max-width:500px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-l);animation:modalPop .2s}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 18px;border-bottom:1px solid var(--br)}
.modal-hd h3{font-size:17px;font-weight:700;letter-spacing:-.2px}
.modal-bd{padding:22px 24px;display:flex;flex-direction:column;gap:16px}
.modal-ft{padding:4px 24px 22px;display:flex;gap:10px;justify-content:flex-end}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-lbl{font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}

/* ── Section ── */
.sec{padding:22px 20px;display:flex;flex-direction:column;gap:20px;max-width:960px;margin:0 auto;width:100%}
.sec-hd{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.sec-title{font-size:19px;font-weight:700;letter-spacing:-.3px}

/* ── Stat cards ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--sf);border:1px solid var(--br2);border-radius:var(--rl);padding:20px 18px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--sh-m)}
.stat-card .bar{position:absolute;top:0;left:0;right:0;height:3px}
.stat-card .ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.stat-card .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--tx2);font-weight:600;margin-bottom:6px}
.stat-card .val{font-size:26px;font-weight:800;font-family:var(--mo);letter-spacing:-.6px}

/* ── Member card ── */
.mem-card{background:var(--sf);border:1px solid var(--br2);border-radius:var(--rl);overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s}
.mem-card:hover{transform:translateY(-3px);box-shadow:var(--sh-m);border-color:var(--br3)}
.mem-card-hd{padding:18px 18px 14px;display:flex;align-items:flex-start;gap:13px}
.mem-card-body{padding:0 18px 16px}
.mem-card-ft{border-top:1px solid var(--br);padding:12px 18px}

/* ── Month payment grid ── */
.mo-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:4px}
.mo-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.mo-lbl{font-size:8px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.1px;line-height:1}
.mo-dot{width:100%;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:transform .12s}
.mo-dot:hover{transform:scale(1.1)}
.mo-paid{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(16,212,142,.3)}
.mo-due{background:var(--sf3);color:var(--tx3);border:1px solid var(--br)}

/* ── Progress ── */
.prog{height:6px;background:var(--sf3);border-radius:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width .4s ease}

/* ── Chat ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 54px)}
.chat-mine{background:var(--ac);color:#fff;border-radius:18px 18px 4px 18px;padding:9px 14px;font-size:14px;line-height:1.5;max-width:72%;word-break:break-word;display:inline-block;box-shadow:0 2px 8px rgba(91,141,238,.25)}
.chat-other{background:var(--sf2);color:var(--tx);border:1px solid var(--br2);border-radius:18px 18px 18px 4px;padding:9px 14px;font-size:14px;line-height:1.5;max-width:72%;word-break:break-word;display:inline-block}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--br2);display:flex;gap:10px;flex-shrink:0;background:var(--bg)}

/* ── Misc ── */
.empty{text-align:center;padding:60px 20px;color:var(--tx2)}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.4;display:block}
.empty p{font-size:14px;line-height:1.7;max-width:280px;margin:0 auto}
.offline-bar{background:var(--am-s);border-bottom:1px solid rgba(245,166,35,.2);color:var(--am-t);padding:8px 16px;font-size:13px;text-align:center;font-weight:500}
.pinned{background:var(--ac-s);border:1px solid rgba(91,141,238,.2);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--ac-t);display:flex;align-items:flex-start;gap:8px}
.divider{height:1px;background:var(--br)}
.role-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:22px;cursor:pointer;font-size:14px;font-weight:500;border:2px solid var(--br2);background:var(--sf2);transition:all .15s;font-family:var(--fn);color:var(--tx2)}
.role-pill.sel{border-color:var(--ac);background:var(--ac-s);color:var(--ac-t);font-weight:600}
.s-plan{background:var(--am-s);color:var(--am-t);border:1px solid rgba(245,166,35,.2)}
.s-act{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(16,212,142,.2)}
.s-done{background:var(--ac-s);color:var(--ac-t);border:1px solid rgba(91,141,238,.2)}
.s-hold{background:var(--pu-s);color:var(--pu-t);border:1px solid rgba(157,122,250,.2)}
.s-can{background:var(--rd-s);color:var(--rd-t);border:1px solid rgba(255,77,94,.2)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;animation:fadeIn .15s}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:var(--r)}
.spinner{animation:spin .8s linear infinite;width:15px;height:15px;border:2px solid var(--br3);border-top-color:var(--ac);border-radius:50%;display:inline-block;flex-shrink:0}

/* ── Grids ── */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g-mem{display:grid;grid-template-columns:1fr;gap:14px}
.g-proj{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:580px){.g-mem{grid-template-columns:repeat(2,1fr)}.g-proj{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.g4{grid-template-columns:repeat(4,1fr)}.g-proj{grid-template-columns:repeat(3,1fr)}}
@media(max-width:580px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
</style>
</head>

function toast(type,text,dur=4000){
  const box=g('toasts');if(!box)return;
  const el=document.createElement('div');
  const icons={ok:'✅',err:'❌',warn:'⚠️',info:'ℹ️'};
  el.className=`toast t-${type}`;
  el.innerHTML=`<span style="font-size:16px">${icons[type]||'💬'}</span><span>${esc(text)}</span>`;

  box.appendChild(el);

let _ut;
function saveState(name){
  S.history=[{snap:{members:[...S.members],payments:[...S.payments],costs:[...S.costs]},name},...S.history].slice(0,50);
  S.future=[];S.lastAction=name;
  clearTimeout(_ut);_ut=setTimeout(()=>{S.lastAction='';renderFAB();},10000);
  renderFAB();
}
function doUndo(){
  if(!S.history.length)return;
  const[{snap,name},...rest]=S.history;
  S.future=[{snap:{members:S.members,payments:S.payments,costs:S.costs},name},...S.future];
  Object.assign(S,snap);S.history=rest;S.lastAction='';
  renderApp();toast('info',`Undone: ${name}`);
}
function doRedo(){
  if(!S.future.length)return;
  const[{snap,name},...rest]=S.future;
  S.history=[{snap:{members:S.members,payments:S.payments,costs:S.costs},name},...S.history];
  Object.assign(S,snap);S.future=rest;
  renderApp();toast('info',`Redone: ${name}`);
}

const BASE=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;
async function sheetRead(range){
  const r=await fetch(`${BASE}/values/${encodeURIComponent(range)}?key=${API_KEY}`);
  if(!r.ok)throw new Error(`Read failed ${r.status}`);
  return(await r.json()).values||[];
}
async function sheetAppend(range,values){
  if(!S.accessToken){toast('warn','Not signed in — changes saved locally only');return;}
  const r=await fetch(`${BASE}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS&key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${S.accessToken}`},body:JSON.stringify({values})});
  if(!r.ok)throw new Error(`Write failed ${r.status}`);
}
async function sheetPut(range,value){
  if(!S.accessToken)return;
  await fetch(`${BASE}/values/${encodeURIComponent(range)}?valueInputOption=RAW&key=${API_KEY}`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${S.accessToken}`},body:JSON.stringify({values:[[value]]})});
}
async function sheetClear(range){
  if(!S.accessToken)return;
  await fetch(`${BASE}/values/${encodeURIComponent(range)}:clear?key=${API_KEY}`,{method:'POST',headers:{'Authorization':`Bearer ${S.accessToken}`}});
}
async function sheetWrite(range,values){
  if(!S.accessToken||!values.length)return;
  await fetch(`${BASE}/values/${encodeURIComponent(range)}?valueInputOption=RAW&key=${API_KEY}`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${S.accessToken}`},body:JSON.stringify({values})});
}

    S.nizam=niR[0]?.[0]||'';

    try{S.projects=prR[0]?.[0]?JSON.parse(prR[0][0]):[];}catch{S.projects=[];}
    S.orgRoles=orR.map(r=>({member:r[0]||'',role:r[1]||''})).filter(r=>r.member);
    S.pendingPays=ppR.map(r=>({id:r[0]||'',memberName:r[1]||'',memberEmail:r[2]||'',key:r[3]||'',m:+r[4]||0,b:+r[5]||0,status:r[6]||'pending'})).filter(p=>p.id);
  }catch(e){toast('warn','Some data failed to load: '+e.message);}

async function fullSync(){
  if(!S.accessToken){toast('warn','Sign in first to sync');return;}
  S.syncStatus='syncing';renderFAB();
  try{
    if(S.members.length){await sheetClear('Members!A2:I1000');await sheetWrite('Members!A2:I1000',S.members.map(m=>[m.name,m.nick,m.phone,m.email,m.addr,m.join,m.sid,m.notes,m.role]));}
    if(S.payments.length){await sheetClear('Payments!A2:D100000');await sheetWrite('Payments!A2:D100000',S.payments.map(p=>[p.member,p.month,p.monthly,p.book]));}
    if(S.costs.length){await sheetClear('Costs!A2:C1000');await sheetWrite('Costs!A2:C1000',S.costs.map(c=>[c.month,c.amount,c.desc]));}
    if(S.notices.length){await sheetClear('Notices!A2:G2000');await sheetWrite('Notices!A2:G2000',S.notices.map(n=>[n.title,n.body,n.by,n.time,n.privateTo||'',n.pinned?'1':'',n.photo||'']));}
    if(S.orgRoles.length){await sheetClear('OrgRoles!A2:B200');await sheetWrite('OrgRoles!A2:B200',S.orgRoles.map(r=>[r.member,r.role]));}
    if(S.pendingPays.length){await sheetClear('PendingPays!A2:G5000');await sheetWrite('PendingPays!A2:G5000',S.pendingPays.map(p=>[p.id,p.memberName,p.memberEmail,p.key,p.m,p.b,p.status]));}
    await sheetPut('Nizam!A2',S.nizam);
    if(S.aboutUs)await sheetPut('Nizam!B2',JSON.stringify(S.aboutUs));
    await sheetPut('Projects!A2',JSON.stringify(S.projects));
    S.syncStatus='ok';S.lastSynced=new Date().toISOString();
    toast('ok','All data synced to Google Sheets!');
  }catch(e){S.syncStatus='error';toast('err','Sync failed: '+e.message);}
  renderFAB();
}

function doLogin(email,role,token){
  S.user={email};S.role=role;S.accessToken=token;
  sessionStorage.setItem('fth_auth','1');sessionStorage.setItem('fth_email',email);sessionStorage.setItem('fth_role',role);
}
function doLogout(){sessionStorage.clear();Object.assign(S,{user:null,role:null,accessToken:null,mobileOpen:false});closeModal();renderApp();}

function googleLogin(){
  const btn=g('gsi-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Signing in…';}
  if(!window.google){toast('err','Google API not loaded, please refresh.');if(btn){btn.disabled=false;btn.textContent='Sign in with Google';}return;}
  window.google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/spreadsheets email profile',
    callback:async resp=>{
      if(resp.error){toast('err',resp.error);if(btn){btn.disabled=false;btn.textContent='Sign in with Google';}return;}
      try{
        const token=resp.access_token;
        const info=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
        const email=info.email;if(!email)throw new Error('Could not get email');
        const acct=ACCOUNTS.find(a=>a.email===email);
        if(acct){doLogin(email,acct.role,token);loadAll();renderApp();return;}
        const rows=await sheetRead('Members!A2:I1000');
        const mem=rows.find(r=>r[3]===email);
        if(mem){doLogin(email,mem[8]==='admin'?'admin':'viewer',token);loadAll();renderApp();return;}
        throw new Error('Access denied — your email is not registered in Fityahal.');
      }catch(e){toast('err',e.message);if(btn){btn.disabled=false;btn.textContent='Sign in with Google';}}
    }
  }).requestAccessToken({prompt:'consent'});
}

function dashHTML(){

  const last2=getLast12().slice(-2);
  const overdue=S.members.filter(m=>last2.every(mo=>!S.payments.some(p=>p.member===m.name&&p.month===mo&&(p.monthly+p.book)>0)));
  const myPend=S.pendingPays.filter(p=>p.memberEmail===S.user?.email&&p.status==='pending');

  const cards=[
    {lbl:'Total Collected',val:tk(col),color:'var(--gn-t)',bg:'var(--gn-s)',bar:'var(--g2)',ico:'💰'},
    {lbl:'Total Costs',val:tk(cos),color:'var(--rd-t)',bg:'var(--rd-s)',bar:'var(--g3)',ico:'📉'},

  // Alerts

  if(!isAdmin()&&myPend.length)h+=`<div style="background:var(--am-s);border:1px solid rgba(245,166,35,.2);border-radius:var(--rl);padding:16px 18px"><p style="font-size:14px;font-weight:600;color:var(--am-t);margin-bottom:10px">⏳ Your Pending Payments (${myPend.length})</p>${myPend.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(245,166,35,.15);font-size:13.5px"><span class="mono" style="color:var(--am-t)">${tk(p.m+p.b)}</span><span class="badge b-warn">Awaiting Admin Approval</span></div>`).join('')}</div>`;

  // Admin actions
  if(isAdmin())h+=`<div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-p" onclick="openModal('addPayment')">＋ Add Payment</button><button class="btn" onclick="openModal('addCost')">＋ Add Cost</button><button class="btn" onclick="exportPDF()">📄 Export PDF</button></div>`;

  // Recent data
  const recentPays=[...S.payments].reverse().slice(0,6);
  const recentCosts=[...S.costs].reverse().slice(0,5);
  h+=`<div class="g2" style="align-items:start;gap:18px">`;
  h+=`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="font-size:14px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px">Recent Payments</h3><span style="font-size:12px;color:var(--tx3)">${S.payments.length} total</span></div>${recentPays.length?`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Member</th><th>Month</th><th>Amount</th></tr></thead><tbody>${recentPays.map(p=>`<tr><td style="font-weight:500">${esc(p.member)}</td><td style="color:var(--tx2)">${esc(p.month)}</td><td class="mono pos">${tk(p.monthly+p.book)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty" style="padding:32px"><span class="empty-ico">💳</span><p>No payments yet</p></div>`}</div>`;
  h+=`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="font-size:14px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px">Recent Costs</h3><span style="font-size:12px;color:var(--tx3)">${S.costs.length} total</span></div>${recentCosts.length?`<div style="display:flex;flex-direction:column">${recentCosts.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--br)"><div><p style="font-size:14px">${esc(c.desc)}</p><p style="font-size:12px;color:var(--tx3);margin-top:2px">${esc(c.month)}</p></div><span class="mono neg" style="font-size:14px;flex-shrink:0;margin-left:12px">${tk(c.amount)}</span></div>`).join('')}</div>`:`<div class="empty" style="padding:32px"><span class="empty-ico">💸</span><p>No costs yet</p></div>`}</div>`;
  h+=`</div></div>`;
  return h;

function membHTML(){

  const getStats=name=>{const mp=S.payments.filter(p=>p.member===name);return{tot:mp.reduce((s,p)=>s+p.monthly+p.book,0),cnt:new Set(mp.filter(p=>(p.monthly+p.book)>0).map(p=>p.month)).size,last:mp[mp.length-1]?.month||'—'};};

            ${m.nick?`<div style="font-size:12.5px;color:var(--tx3);margin-bottom:6px">${esc(m.nick)}</div>`:''}
            ${roleBadge(m)}

            <div style="background:var(--sf2);border:1px solid var(--br);border-radius:10px;padding:10px 8px;text-align:center"><div class="mono bal" style="font-size:13px;font-weight:700">${st.cnt}</div><div style="font-size:9.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-top:3px">Months</div></div>
            <div style="background:var(--sf2);border:1px solid var(--br);border-radius:10px;padding:10px 8px;text-align:center"><div style="font-size:12px;font-weight:600;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${st.last.split(' ')[0]||'—'}</div><div style="font-size:9.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-top:3px">Last Pay</div></div>

      </div>`;
    }).join('')}</div>`;
  }else{
    const rows=filtered.map(m=>{const i=S.members.indexOf(m);return`<tr>
      <td><div style="display:flex;align-items:center;gap:10px">${avEl(m.name,36,m.email)}<div><div style="font-weight:600;font-size:14px">${esc(m.name)}</div>${m.nick?`<div style="font-size:11.5px;color:var(--tx3)">${esc(m.nick)}</div>`:''}</div></div></td>

function msgHTML(){
  const gTab=S.msgTab||'group';
  let inner='';

  if(gTab==='group'){
    const msgs=S.groupMsgs||[];
    const pinned=msgs.filter(m=>m.pinned&&!m.deleted);
    const sf=(S.chatSearch||'').toLowerCase();
    const show=sf?msgs.filter(m=>!m.deleted&&m.text.toLowerCase().includes(sf)):msgs;
    const rows=show.map(m=>{
      const mine=m.email===S.user?.email,del=m.deleted;
      const t=m.time?new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
      let acts='';
      if(!del){
        if(mine||isAdmin())acts+=`<button onclick="delGMsg('${m.id}')" title="Delete" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:12px;padding:0 3px;transition:color .15s" onmouseover="this.style.color='var(--rd-t)'" onmouseout="this.style.color='var(--tx3)'">🗑</button>`;
        if(isAdmin())acts+=`<button onclick="pinGMsg('${m.id}')" title="${m.pinned?'Unpin':'Pin'}" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:12px;padding:0 3px">${m.pinned?'📌':'📍'}</button>`;
        acts+=`<button onclick="reportMsg('${m.id}')" title="Report" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:12px;padding:0 3px">⚑</button>`;
      }
      return`<div style="display:flex;gap:10px;flex-direction:${mine?'row-reverse':'row'};align-items:flex-end;margin-bottom:14px">
        ${avEl(m.name||'?',34,m.email)}
        <div style="max-width:74%">
          ${!mine?`<div style="font-size:11.5px;color:var(--tx3);margin-bottom:4px;font-weight:500">${esc(m.name)}</div>`:''}
          <div class="${mine?'chat-mine':'chat-other'}" ${del?'style="opacity:.4"':''}>${del?'<em style="font-size:13px">[message deleted]</em>':esc(m.text)}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:4px;display:flex;gap:5px;align-items:center;justify-content:${mine?'flex-end':'flex-start'}">${t}${acts}</div>
        </div>
      </div>`;
    }).join('');

    inner=`<div style="display:flex;flex-direction:column;height:100%">
      ${pinned.length?`<div class="pinned" style="margin:10px;flex-shrink:0">📌 ${esc(pinned.map(m=>m.text).join(' | '))}</div>`:''}
      <div style="padding:10px;flex-shrink:0;border-bottom:1px solid var(--br2)"><div class="inp-wrap"><span class="inp-ico">🔍</span><input class="inp" placeholder="Search messages…" value="${esc(S.chatSearch||'')}" oninput="S.chatSearch=this.value;renderScreen()" style="font-size:13px"/></div></div>
      <div id="gchat-msgs" style="flex:1;overflow-y:auto;padding:16px">${rows}<div id="gchat-bot"></div></div>
      <div class="chat-input-row"><input class="inp" id="gchat-in" placeholder="Message the group…" style="flex:1" onkeydown="if(event.key==='Enter')sendGroupMsg()"/><button class="btn btn-p" onclick="sendGroupMsg()">Send</button></div>
    </div>`;
  }else{
    const allRaw=[...new Set([...S.members.filter(m=>m.email&&m.email!==S.user?.email).map(m=>m.email)])];
    const dsf=(S.dmSearch||'').toLowerCase();
    const all=dsf?allRaw.filter(c=>{const mem=S.members.find(m=>m.email===c);return(mem?.name||c).toLowerCase().includes(dsf);}):allRaw;
    const act=S.dmTarget;
    const dmMsgs=act&&S.dmChats[act]?S.dmChats[act]:[];
    const actMem=act?S.members.find(m=>m.email===act):null;

    const contacts=all.map(c=>{
      const mem=S.members.find(m=>m.email===c);const name=mem?.name||c.split('@')[0];
      return`<div onclick="S.dmTarget='${esc(c)}';S.msgTab='dm';renderScreen();setTimeout(()=>g('dm-bot')?.scrollIntoView(),80)" style="padding:12px 16px;cursor:pointer;background:${act===c?'var(--ac-s)':'transparent'};border-left:3px solid ${act===c?'var(--ac)':'transparent'};display:flex;align-items:center;gap:10px;transition:background .12s">
        ${avEl(name,36,c)}
        <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</div>${mem?.nick?`<div style="font-size:12px;color:var(--tx3)">${esc(mem.nick)}</div>`:''}</div>
      </div>`;}).join('');

    const dmRows=dmMsgs.map(m=>{const mine=m.email===S.user?.email;return`<div style="display:flex;justify-content:${mine?'flex-end':'flex-start'};margin-bottom:10px"><div class="${mine?'chat-mine':'chat-other'}">${esc(m.text)}<div style="font-size:10.5px;opacity:.65;margin-top:3px;text-align:${mine?'right':'left'}">${new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div></div>`;}).join('');

    inner=`<div style="display:flex;flex:1;overflow:hidden">
      <div style="width:220px;border-right:1px solid var(--br2);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column">
        <div style="padding:10px;border-bottom:1px solid var(--br)"><div class="inp-wrap"><span class="inp-ico">🔍</span><input class="inp" placeholder="Search members…" value="${esc(S.dmSearch||'')}" oninput="S.dmSearch=this.value;renderScreen()" style="font-size:13px"/></div></div>
        ${all.length?contacts:`<div style="padding:24px 16px;text-align:center;color:var(--tx3);font-size:13px">No members with emails</div>`}
      </div>
      ${act?`<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div style="padding:12px 18px;border-bottom:1px solid var(--br2);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg)">
          ${avEl(actMem?.name||act.split('@')[0],36,act)}
          <div><div style="font-weight:600;font-size:15px">${esc(actMem?.name||act)}</div>${actMem?.nick?`<div style="font-size:12px;color:var(--tx3)">${esc(actMem.nick)}</div>`:''}</div>
        </div>
        <div id="dm-msgs" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column">${dmRows}<div id="dm-bot"></div></div>
        <div class="chat-input-row"><input class="inp" id="dm-in" placeholder="Send a message…" style="flex:1" onkeydown="if(event.key==='Enter')sendDM()"/><button class="btn btn-p" onclick="sendDM()">Send</button></div>
      </div>`:`<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--tx3)"><span style="font-size:48px;opacity:.25">💬</span><p style="font-size:14px">Select a member from the list to start chatting</p></div>`}
    </div>`;
  }

  return`<div class="chat-wrap">
    <div style="display:flex;border-bottom:1px solid var(--br2);flex-shrink:0">
      <button class="nav-tab${gTab==='group'?' active':''}" onclick="S.msgTab='group';S.chatSearch='';S.unreadChat=0;renderScreen();setTimeout(()=>g('gchat-bot')?.scrollIntoView(),80)">💬 Group Chat${S.unreadChat>0&&gTab!=='group'?` <span style="background:var(--rd);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:4px">${S.unreadChat}</span>`:''}</button>
      <button class="nav-tab${gTab==='dm'?' active':''}" onclick="S.msgTab='dm';S.dmSearch='';renderScreen()">📩 Direct Messages</button>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">${inner}</div>
  </div>`;
}

// ─────────────────────────────────────────
const SCREENS={
  dashboard:dashHTML,members:membHTML,overview:ovHTML,projects:projHTML,
  announcements:noticeHTML,nizam:nizHTML,memories:memHTML,notifications:alertsHTML,
  messages:msgHTML,sync:syncHTML,profile:profileHTML,aboutus:aboutHTML,
};

function renderScreen(){
  const main=g('main-content');
  if(!main)return renderApp();
  main.innerHTML=(SCREENS[S.tab]||dashHTML)();
  renderModal();
}

function renderFAB(){
  const fab=g('fab');if(!fab)return;
  if(!S.user||!isAdmin()){fab.innerHTML='';return;}
  fab.innerHTML=
    (S.history.length?`<button class="btn btn-sm" onclick="doUndo()" title="Undo (Ctrl+Z)" style="box-shadow:var(--sh-m)">↩ Undo</button>`:'') +
    (S.future.length?`<button class="btn btn-sm" onclick="doRedo()" title="Redo" style="box-shadow:var(--sh-m)">↪ Redo</button>`:'') +
    `<button class="btn btn-p btn-sm" onclick="fullSync()" title="Sync to Google Sheets (Ctrl+S)" style="box-shadow:var(--sh-m)">${S.syncStatus==='syncing'?'<span class="spinner"></span>':'🔄'} ${S.syncStatus==='syncing'?'Syncing…':'Sync'}</button>`;
}

function renderLogin(){
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:700px;height:400px;background:radial-gradient(ellipse,rgba(91,141,238,.1),transparent 70%);pointer-events:none"></div>
    <div style="position:absolute;bottom:-10%;right:10%;width:300px;height:300px;background:radial-gradient(ellipse,rgba(157,122,250,.07),transparent 70%);pointer-events:none"></div>
    <div style="max-width:400px;width:100%;text-align:center;position:relative;z-index:1">
      <div style="position:relative;display:inline-block;margin-bottom:28px">
        <div style="position:absolute;inset:-14px;border-radius:50%;background:radial-gradient(circle,rgba(91,141,238,.15),transparent 70%);animation:pulse 3s ease-in-out infinite"></div>
        <div style="width:108px;height:108px;border-radius:50%;background:rgba(91,141,238,.08);border:1px solid rgba(91,141,238,.2);display:flex;align-items:center;justify-content:center;margin:0 auto;backdrop-filter:blur(8px)">
          <img src="${LOGO_SRC}" style="width:84px;height:84px;object-fit:contain"/>
        </div>
      </div>
      <h1 style="font-size:34px;font-weight:800;letter-spacing:-1px;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px">Fityahal</h1>
      <p style="color:var(--tx3);font-size:13px;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px">Account Book</p>
      <p style="color:var(--tx3);font-size:12px;font-style:italic;margin-bottom:38px;opacity:.7">"We Hear And Obey"</p>
      <div style="background:rgba(15,21,32,.8);border:1px solid rgba(91,141,238,.15);border-radius:22px;padding:36px 32px;backdrop-filter:blur(16px);box-shadow:0 24px 80px rgba(0,0,0,.6)">
        <p style="color:var(--tx2);font-size:14.5px;margin-bottom:26px;line-height:1.7">Sign in with your registered Google account to access the Fityahal Account Book.</p>
        <button id="gsi-btn" onclick="googleLogin()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:15px 22px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:14px;color:var(--tx);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:background .2s,border-color .2s" id="gsi-btn">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </button>
      </div>
      <p style="color:var(--tx3);font-size:12px;margin-top:24px;opacity:.6">Access is restricted to registered Fityahal members only.</p>
    </div>
  </div>`;
}

function renderApp(){
  const app=g('app');if(!app)return;
  if(!S.user){app.innerHTML=renderLogin();renderModal();renderFAB();return;}

  const nav=NAV_ALL.filter(n=>!n.admin||isAdmin());
  const tabs=nav.map(n=>{
    const badge=n.id==='messages'&&S.tab!=='messages'&&(S.unreadChat||0)>0
      ?`<span style="background:var(--rd);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:4px">${S.unreadChat}</span>`:'';
    return`<button class="nav-tab${S.tab===n.id?' active':''}" onclick="S.tab='${n.id}';S.mobileOpen=false;${n.id==='messages'?'S.unreadChat=0;':''}renderApp()">${n.label}${badge}</button>`;
  }).join('');

  const mobTabs=nav.map(n=>`<button class="mob-tab${S.tab===n.id?' active':''}" onclick="S.tab='${n.id}';S.mobileOpen=false;${n.id==='messages'?'S.unreadChat=0;':''}renderApp()"><span style="font-size:20px;width:28px;text-align:center">${n.icon}</span>${n.label}</button>`).join('');

  const pic=getMpic(S.user?.email||'');
  const avBtn=pic?`<img src="${esc(pic)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`:esc((S.user?.email?.[0]||'U').toUpperCase());

  app.innerHTML=
    (!S.online?`<div class="offline-bar">⚠️ You are offline. Changes will be saved locally until you reconnect.</div>`:'') +
    `<div class="topbar">
      <div class="topbar-inner">
        <div class="logo-area">
          <img src="${LOGO_SRC}" class="logo-img" alt="Fityahal"/>
          ${S.loading?`<span class="spinner" style="margin-left:4px"></span>`:''}
        </div>
        <div class="nav-scroll">${tabs}</div>
        <div class="topbar-right">
          <span class="role-lbl" style="font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">${esc(S.role)}</span>
          <button class="hbg${S.mobileOpen?' open':''}" onclick="S.mobileOpen=!S.mobileOpen;renderApp()" aria-label="Menu"><span></span><span></span><span></span></button>
          <button onclick="S.tab='profile';S.mobileOpen=false;renderApp()" style="width:32px;height:32px;border-radius:50%;background:var(--g1);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center">${avBtn}</button>
        </div>
      </div>
    </div>
    <div class="mob-menu${S.mobileOpen?' open':''}" onclick="if(event.target===this){S.mobileOpen=false;renderApp()}">${mobTabs}</div>
    <main id="main-content" style="flex:1;overflow-y:auto">${S.loading?`<div style="display:flex;align-items:center;justify-content:center;padding:80px;flex-direction:column;gap:16px"><span class="spinner" style="width:32px;height:32px;border-width:3px"></span><p style="color:var(--tx3);font-size:14px">Loading data from Google Sheets…</p></div>`:(SCREENS[S.tab]||dashHTML)()}</main>`;

  renderModal();
  renderFAB();

  if(S.tab==='messages'){
    setTimeout(()=>{
      const b=S.msgTab==='group'?g('gchat-bot'):g('dm-bot');
      b?.scrollIntoView();
    },80);
  }
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(!S.user)return;
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='s'){e.preventDefault();if(isAdmin())fullSync();}
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();doUndo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();doRedo();}
});
window.addEventListener('online',()=>{S.online=true;renderApp();toast('ok','Back online!');});
window.addEventListener('offline',()=>{S.online=false;renderApp();toast('warn','You are offline');});

// Load Google Identity Services
const gsiScript=document.createElement('script');
gsiScript.src='https://accounts.google.com/gsi/client';
gsiScript.async=true;
document.head.appendChild(gsiScript);

// Boot
if(checkSession()){renderApp();loadAll();}else{renderApp();}
</script>
</body>
</html>
