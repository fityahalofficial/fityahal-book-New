<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0a0c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="description" content="Fityahal — We Hear And Obey"/>
<title>Fityahal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080b12;--bg2:#0d1220;--sf:#111827;--sf2:#1a2235;--sf3:#222f45;--sf4:#2a3550;
  --tx:#eef1ff;--tx2:#8b92b3;--tx3:#4a5170;
  --ac:#5b8dee;--ac-s:rgba(91,141,238,.15);--ac-t:#93b4f8;
  --gn:#10d48e;--gn-s:rgba(16,212,142,.12);--gn-t:#34e8a8;
  --rd:#ff5c6c;--rd-s:rgba(255,92,108,.12);--rd-t:#ff8a96;
  --am:#ffad2e;--am-s:rgba(255,173,46,.12);--am-t:#ffc86a;
  --pu:#9d7afa;--pu-s:rgba(157,122,250,.12);--pu-t:#c4acff;
  --br:rgba(255,255,255,.04);--br2:rgba(255,255,255,.08);--br3:rgba(255,255,255,.13);
  --sh:0 1px 8px rgba(0,0,0,.5);--sh-m:0 4px 24px rgba(0,0,0,.6);--sh-l:0 16px 64px rgba(0,0,0,.8);
  --r:8px;--rl:12px;--rxl:18px;
  --fn:"Inter",sans-serif;--mo:"JetBrains Mono",monospace;
  --g1:linear-gradient(135deg,#4f7ef8,#8b6cf6);
  --g2:linear-gradient(135deg,#0ec97f,#4f7ef8);
  --g3:linear-gradient(135deg,#f04f5e,#f5823a);
  --g4:linear-gradient(135deg,#f5a623,#f04f5e);
}
[data-theme=light]{
  --bg:#f0f4ff;--bg2:#e4eaf8;--sf:#fff;--sf2:#f0f4ff;--sf3:#e4eaf8;--sf4:#d8dff5;
  --tx:#0d1220;--tx2:#4a5580;--tx3:#8892b0;
  --br:rgba(0,0,0,.06);--br2:rgba(0,0,0,.10);--br3:rgba(0,0,0,.15);
  --sh:0 1px 8px rgba(0,0,0,.08);--sh-m:0 4px 24px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(91,141,238,.06),transparent);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sf4);border-radius:4px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--sf2);border:1px solid var(--br2);border-radius:var(--r);font-size:13px;font-weight:500;font-family:var(--fn);color:var(--tx);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--sf3);border-color:var(--br3)}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--ac);border-color:transparent;color:#fff;font-weight:600}
.btn-p:hover{background:#4a7de0;border-color:transparent}
.btn-ghost{background:transparent;border-color:transparent;color:var(--tx2)}
.btn-ghost:hover{background:var(--sf2);color:var(--tx)}
.btn-danger{background:var(--rd-s);border-color:rgba(240,79,94,.2);color:var(--rd-t)}
.btn-danger:hover{background:rgba(240,79,94,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:7px}
/* Inputs */
.inp{width:100%;padding:9px 12px;background:var(--sf2);border:1px solid var(--br2);border-radius:var(--r);color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.4}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(79,126,248,.15)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:vertical;min-height:80px}
.inp-wrap{position:relative;display:flex;align-items:center}
.inp-wrap .inp{padding-left:34px}
.inp-wrap .inp-ico{position:absolute;left:10px;color:var(--tx3);font-size:14px;pointer-events:none}
/* Cards */
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl)}
.card-h:hover{box-shadow:var(--sh-m)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
.b-admin{background:var(--ac-s);color:var(--ac-t);border:1px solid rgba(79,126,248,.2)}
.b-ok{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(14,201,127,.2)}
.b-err{background:var(--rd-s);color:var(--rd-t);border:1px solid rgba(240,79,94,.2)}
.b-warn{background:var(--am-s);color:var(--am-t);border:1px solid rgba(245,166,35,.2)}
.b-pu{background:var(--pu-s);color:var(--pu-t);border:1px solid rgba(139,108,246,.2)}
.b-gen{background:var(--sf3);color:var(--tx2);border:1px solid var(--br2)}
.b-sup{background:linear-gradient(135deg,#f5a623,#f04f5e);color:#fff;border:none}
/* Avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden;background:var(--g1);color:#fff}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
/* Mono */
.mono{font-family:var(--mo)}
.pos{color:var(--gn-t)}.neg{color:var(--rd-t)}.bal{color:var(--ac-t)}
/* Toast */
.toast-box{position:fixed;top:62px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9000}
.toast{background:var(--sf);border-radius:var(--rl);padding:11px 15px;min-width:220px;max-width:300px;box-shadow:var(--sh-l);border-left:3px solid var(--ac);animation:slideR .2s;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.toast.t-ok{border-color:var(--gn)}.toast.t-err{border-color:var(--rd)}.toast.t-warn{border-color:var(--am)}
/* Topbar */
.topbar{background:rgba(8,11,18,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--br2);position:sticky;top:0;z-index:500;flex-shrink:0}
.topbar-inner{display:flex;align-items:center;height:52px;padding:0 14px;gap:0}
.logo-area{display:flex;align-items:center;gap:10px;flex-shrink:0;padding-right:14px;border-right:1px solid var(--br2);margin-right:4px}
.logo-img{height:30px;width:auto;filter:brightness(1.05)}
.nav-scroll{flex:1;overflow-x:auto;scrollbar-width:none;display:flex;align-items:stretch;height:52px}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-tab{display:flex;align-items:center;gap:5px;padding:0 13px;height:52px;font-size:12.5px;font-weight:500;color:var(--tx3);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:var(--fn);transition:color .15s,border-color .15s;flex-shrink:0}
.nav-tab:hover{color:var(--tx2)}
.nav-tab.active{color:var(--ac-t);border-bottom-color:var(--ac);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-left:12px;border-left:1px solid var(--br2);margin-left:auto}
/* Hamburger */
.hbg{display:none;flex-direction:column;gap:4px;width:32px;height:32px;cursor:pointer;padding:6px;background:none;border:1px solid var(--br2);border-radius:var(--r);flex-shrink:0}
.hbg span{display:block;height:2px;background:var(--tx2);border-radius:2px;transition:all .22s}
.hbg.open span:first-child{transform:translateY(6px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hbg.open span:last-child{transform:translateY(-6px) rotate(-45deg)}
.mob-menu{display:none;position:fixed;inset:0;top:52px;background:var(--bg);z-index:400;overflow-y:auto;border-top:1px solid var(--br2)}
.mob-menu.open{display:block;animation:fadeIn .15s}
.mob-tab{display:flex;align-items:center;gap:12px;width:100%;padding:15px 20px;font-size:14px;font-weight:500;color:var(--tx2);border:none;background:none;cursor:pointer;font-family:var(--fn);border-bottom:1px solid var(--br);transition:background .15s}
.mob-tab:hover{background:var(--sf2);color:var(--tx)}
.mob-tab.active{background:var(--ac-s);color:var(--ac-t);font-weight:600}
@media(max-width:700px){.hbg{display:flex}.nav-scroll{display:none}.role-lbl{display:none}}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--sf2);color:var(--tx3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;padding:9px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--br2)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--br);vertical-align:middle}
.tbl tbody tr:hover td{background:var(--sf2)}
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--br)}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;animation:fadeIn .15s}
.modal{background:var(--sf);border:1px solid var(--br2);border-radius:var(--rxl);max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-l);animation:modalPop .2s}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-bd{padding:18px 22px;display:flex;flex-direction:column;gap:13px}
.modal-ft{padding:0 22px 20px;display:flex;gap:8px;justify-content:flex-end}
.form-row{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
/* Section */
.sec{padding:18px;display:flex;flex-direction:column;gap:16px;max-width:1100px;margin:0 auto;width:100%}
.sec-hd{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sec-title{font-size:17px;font-weight:700;letter-spacing:-.2px}
/* Stat card */
.stat-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl);padding:18px 16px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
.stat-card:hover{box-shadow:var(--sh-m);transform:translateY(-2px)}
.stat-card .sc-bar{position:absolute;top:0;left:0;right:0;height:3px}
.stat-card .sc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.stat-card .sc-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);font-weight:600;margin-bottom:6px}
.stat-card .sc-val{font-size:22px;font-weight:800;font-family:var(--mo);letter-spacing:-.5px}
/* Member card */
.mem-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--rl);overflow:hidden;transition:box-shadow .2s,transform .2s}
.mem-card:hover{box-shadow:var(--sh-m);transform:translateY(-2px)}
.mem-card-hd{padding:16px 16px 12px;display:flex;align-items:flex-start;gap:12px}
.mem-card-body{padding:0 16px 14px}
.mem-card-ft{border-top:1px solid var(--br);padding:10px 16px}
/* Month chips */
.mo-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px}
.mo-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
.mo-lbl{font-size:8px;color:var(--tx3);font-weight:600;letter-spacing:.1px;line-height:1}
.mo-dot{width:100%;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.mo-paid{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(14,201,127,.25)}
.mo-due{background:var(--sf2);color:var(--tx3);border:1px solid var(--br)}
/* Progress */
.prog{height:5px;background:var(--sf3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
/* Chat */
.chat-mine{background:var(--ac);color:#fff;border-radius:16px 16px 4px 16px;padding:9px 13px;font-size:13px;line-height:1.5;max-width:72%;word-break:break-word}
.chat-other{background:var(--sf2);color:var(--tx);border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:13px;line-height:1.5;max-width:72%;word-break:break-word}
/* Misc */
.divider{height:1px;background:var(--br)}
.empty{text-align:center;padding:48px 16px;color:var(--tx3)}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px}
.offline-bar{background:var(--am-s);border-bottom:1px solid rgba(245,166,35,.2);color:var(--am-t);padding:7px 16px;font-size:12px;text-align:center;font-weight:500}
.undo-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--br3);border-radius:var(--rl);padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh-l);z-index:600;font-size:13px;animation:slideUp .2s;white-space:nowrap}
.pinned{background:var(--ac-s);border:1px solid rgba(79,126,248,.2);border-radius:var(--r);padding:9px 13px;font-size:13px;color:var(--ac-t);display:flex;align-items:flex-start;gap:7px}
.role-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:2px solid var(--br2);background:var(--sf2);transition:all .15s;font-family:var(--fn);color:var(--tx2)}
.role-pill.sel{border-color:var(--ac);background:var(--ac-s);color:var(--ac-t);font-weight:600}
.s-plan{background:var(--am-s);color:var(--am-t);border:1px solid rgba(245,166,35,.2)}
.s-act{background:var(--gn-s);color:var(--gn-t);border:1px solid rgba(14,201,127,.2)}
.s-done{background:var(--ac-s);color:var(--ac-t);border:1px solid rgba(79,126,248,.2)}
.s-hold{background:var(--pu-s);color:var(--pu-t);border:1px solid rgba(139,108,246,.2)}
.s-can{background:var(--rd-s);color:var(--rd-t);border:1px solid rgba(240,79,94,.2)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;z-index:9000;cursor:zoom-out;animation:fadeIn .15s}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:var(--r)}
/* Grids */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g-mem{display:grid;grid-template-columns:1fr;gap:14px}
.g-proj{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.g-mem{grid-template-columns:repeat(2,1fr)}.g-proj{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.g4{grid-template-columns:repeat(4,1fr)}.g-proj{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}
/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{animation:spin .8s linear infinite;width:15px;height:15px;border:2px solid var(--br2);border-top-color:var(--ac);border-radius:50%;display:inline-block;flex-shrink:0}
</style>
</head>

        '</div>'+
      '</div>'+
    '</div></div>';
  }

  if(name==='noticeDetail'){
    const n=data;

async function saveMember(idx){

      '<div style="width:210px;border-right:1px solid var(--br2);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column">'+

        myPays.map(p=>'<tr><td style="color:var(--tx2)">'+esc(p.month)+'</td><td class="mono pos">'+tk(p.monthly)+'</td><td class="mono pos">'+tk(p.book)+'</td><td class="mono bal">'+tk(p.monthly+p.book)+'</td></tr>').join('')+

    '<div class="mob-menu'+(S.mobileMenuOpen?' open':'')+'" onclick="if(event.target===this){S.mobileMenuOpen=false;renderApp()}">'+mobTabs+'</div>'+
    '<main id="main-content" style="flex:1;overflow-y:auto">'+(SCREENS[S.tab]||dashboardHTML)()+'</main>'+
    (S.lastAction&&S.history.length?'<div class="undo-bar">↩ <span style="color:var(--tx2)">'+esc(S.lastAction)+'</span><button class="btn btn-sm" onclick="doUndo()">Undo</button>'+(S.future.length?'<button class="btn btn-sm" onclick="doRedo()">Redo</button>':'')+' <button class="btn btn-ghost btn-icon btn-sm" onclick="S.lastAction=\'\';renderApp()">✕</button></div>':'');

  renderModal();
  if(S.tab==='messages'){
    setTimeout(()=>{
      const b=S.msgTab==='group'?g('gchat-bot'):g('dm-bot');
      if(b)b.scrollIntoView();
    },100);
  }
}

// Keyboard shortcuts
window.addEventListener('keydown',e=>{
  if(!S.user)return;
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='s'){e.preventDefault();if(isAdmin())fullSync();}
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();doUndo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();doRedo();}
});
window.addEventListener('online',()=>{S.online=true;renderApp();});
window.addEventListener('offline',()=>{S.online=false;renderApp();});

// Load GIS
const gsi=document.createElement('script');gsi.src='https://accounts.google.com/gsi/client';gsi.async=true;document.head.appendChild(gsi);

// Boot
if(checkSession()){renderApp();loadAll();}else{renderApp();}
</script>
</body>
</html>
